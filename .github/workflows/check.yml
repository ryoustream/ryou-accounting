name: check-urls
on:
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: cek
        continue-on-error: true
        run: |
          set +e
          {
            echo "=== index ==="
            curl -s -o /dev/null -w "HTTP_CODE:%{http_code} REDIRECT_URL:%{redirect_url}\n" --max-time 15 https://ryoustream.github.io/ryou-accounting/
            echo "=== manifest.json ==="
            curl -s -o /dev/null -w "HTTP_CODE:%{http_code} CONTENT_TYPE:%{content_type}\n" --max-time 15 https://ryoustream.github.io/ryou-accounting/manifest.json
            echo "=== service-worker.js ==="
            curl -s -o /dev/null -w "HTTP_CODE:%{http_code} CONTENT_TYPE:%{content_type}\n" --max-time 15 https://ryoustream.github.io/ryou-accounting/service-worker.js
          } > check-output.txt 2>&1
          exit 0
      - name: commit
        if: always()
        run: |
          git config user.name "diagnose-bot"
          git config user.email "actions@github.com"
          git add check-output.txt
          git commit -m "check output v2 [skip ci]" || echo none
          git push
