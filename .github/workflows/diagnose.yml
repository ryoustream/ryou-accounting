name: 🔍 Diagnose PWA
on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cek struktur folder FTP & endpoint HTTP
        continue-on-error: true
        env:
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          set +e
          {
            echo "=== LIST root FTP ==="
            curl -s --max-time 20 "ftp://${FTP_USERNAME}:${FTP_PASSWORD}@ftpupload.net/" --list-only 2>&1
            echo ""
            echo "=== LIST /htdocs/ ==="
            curl -s --max-time 20 "ftp://${FTP_USERNAME}:${FTP_PASSWORD}@ftpupload.net/htdocs/" --list-only 2>&1
            echo ""
            echo "=== GET (bukan HEAD) https://accr.ct.ws/ status only ==="
            curl -s -o /tmp/body.html -w "HTTP_CODE:%{http_code} SIZE:%{size_download}\n" --max-time 15 https://accr.ct.ws/ 2>&1
            echo "--- 300 char body ---"
            head -c 300 /tmp/body.html
            echo ""
            echo "=== GET manifest.json status only ==="
            curl -s -o /tmp/mf.json -w "HTTP_CODE:%{http_code} SIZE:%{size_download}\n" --max-time 15 https://accr.ct.ws/manifest.json 2>&1
            head -c 300 /tmp/mf.json
          } > diagnose-output.txt 2>&1
          exit 0
      - name: Commit hasil diagnostik
        if: always()
        run: |
          git config user.name "diagnose-bot"
          git config user.email "actions@github.com"
          git add diagnose-output.txt
          git commit -m "diagnose output v2 [skip ci]" || echo "no changes"
          git push
