async function renderReportsPage(root){
  const [salesRaw,purchasesRaw,cashEntries,receivables,payables] = await Promise.all([
    dbGetAll("sales"),dbGetAll("purchases"),dbGetAll("cashEntries"),
    dbGetAll("receivables"),dbGetAll("payables")
  ]);
  /* Nota berstatus "dibatalkan" tetap tersimpan sbg riwayat, tapi tidak dihitung di laporan */
  const sales = salesRaw.filter(s=>s.status!=="dibatalkan");
  const purchases = purchasesRaw.filter(p=>p.status!=="dibatalkan");

  let activeTab = "labarugi";
  const TABS = [
    {id:"labarugi",label:"Laba Rugi"},
    {id:"penjualan",label:"Penjualan"},
    {id:"pembelian",label:"Pembelian"},
    {id:"kas",label:"Kas"},
    {id:"piutang",label:"Piutang"},
    {id:"hutang",label:"Hutang"}
  ];

  root.innerHTML=`
    <div class="tab-bar" id="report-tabs">
      ${TABS.map(t=>`<button class="tab-item${t.id===activeTab?" active":""}" data-tab="${t.id}">${t.label}</button>`).join("")}
    </div>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap;" class="no-print">
      <div class="month-filter-box" title="Pilih bulan">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        <input type="month" id="rpt-bulan" value="${todayStr().slice(0,7)}">
      </div>
      <select class="btn" id="rpt-tahun" style="padding:8px 10px;">
        ${Array.from({length:5},(_,i)=>new Date().getFullYear()-i).map(y=>`<option value="${y}">${y}</option>`).join("")}
      </select>
      <button class="btn" id="rpt-export"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;"><path d="M12 3v12"/><path d="M7 10l5 5 5-5"/><path d="M4 19h16"/></svg>Export XLS</button>
    </div>
    <div id="report-body"></div>
  `;

  root.querySelectorAll(".tab-item").forEach(btn=>{
    btn.addEventListener("click",()=>{
      activeTab=btn.dataset.tab;
      root.querySelectorAll(".tab-item").forEach(b=>b.classList.toggle("active",b.dataset.tab===activeTab));
      renderReportBody();
    });
  });
  root.querySelector("#rpt-bulan").addEventListener("change", renderReportBody);
  root.querySelector("#rpt-tahun").addEventListener("change", renderReportBody);

  function getBulan(){ return root.querySelector("#rpt-bulan").value; }
  function getTahun(){ return root.querySelector("#rpt-tahun").value; }

  function renderReportBody(){
    const bulan = getBulan();
    const tahun = getTahun();
    const body = root.querySelector("#report-body");
    const sum = (arr,pred,field)=>arr.filter(pred).reduce((a,b)=>a+Number(b[field]||0),0);

    if(activeTab==="labarugi"){
      const salesM  = sum(sales, s=>(s.tanggal||"").startsWith(bulan), "total");
      const purM    = sum(purchases, p=>(p.tanggal||"").startsWith(bulan), "total");
      const labaM   = salesM-purM;
      const salesY  = sum(sales, s=>(s.tanggal||"").startsWith(tahun), "total");
      const purY    = sum(purchases, p=>(p.tanggal||"").startsWith(tahun), "total");
      const labaY   = salesY-purY;
      body.innerHTML=`
        <div class="report-grid">
          <div class="report-card"><div class="rc-label">Penjualan Bulan ${bulan}</div><div class="rc-value num" style="color:var(--primary)">${fmtIDR(salesM)}</div></div>
          <div class="report-card"><div class="rc-label">Pembelian Bulan ${bulan}</div><div class="rc-value num" style="color:var(--red)">${fmtIDR(purM)}</div></div>
          <div class="report-card"><div class="rc-label">Laba Bersih Bulan ${bulan}</div><div class="rc-value num" style="color:${labaM>=0?"var(--primary)":"var(--red)"}">${fmtIDR(labaM)}</div></div>
          <div class="report-card"><div class="rc-label">Penjualan Tahun ${tahun}</div><div class="rc-value num" style="color:var(--primary)">${fmtIDR(salesY)}</div></div>
          <div class="report-card"><div class="rc-label">Pembelian Tahun ${tahun}</div><div class="rc-value num" style="color:var(--red)">${fmtIDR(purY)}</div></div>
          <div class="report-card"><div class="rc-label">Laba Bersih Tahun ${tahun}</div><div class="rc-value num" style="color:${labaY>=0?"var(--primary)":"var(--red)"}">${fmtIDR(labaY)}</div></div>
        </div>
        <div class="section">
          <div class="section-head"><h3>Ringkasan Bulanan — ${bulan}</h3></div>
          <div class="table-wrap">
            <table class="data-table">
              <thead><tr><th>Keterangan</th><th style="text-align:right">Jumlah</th></tr></thead>
              <tbody>
                <tr><td>Total Penjualan</td><td class="num" style="text-align:right;color:var(--primary);font-weight:700;">${fmtIDR(salesM)}</td></tr>
                <tr><td>Total Pembelian</td><td class="num" style="text-align:right;color:var(--red);font-weight:700;">${fmtIDR(purM)}</td></tr>
                <tr style="background:var(--surface-2);"><td><strong>Laba / Rugi</strong></td><td class="num" style="text-align:right;font-weight:800;color:${labaM>=0?"var(--primary-ink)":"var(--red)"};">${fmtIDR(labaM)}</td></tr>
              </tbody>
            </table>
          </div>
        </div>`;
      root.querySelector("#rpt-export").onclick=()=>{
        const rows=[
          {keterangan:"Penjualan",jumlah:salesM},
          {keterangan:"Pembelian",jumlah:purM},
          {keterangan:"Laba Bersih",jumlah:labaM}
        ];
        downloadXLSX(`labarugi_${bulan}.xlsx`, [{name:"Laba Rugi", headers:[{key:"keterangan",label:"Keterangan"},{key:"jumlah",label:"Jumlah"}], rows}]);
        toast("Export laba rugi berhasil.");
      };
      return;
    }

    if(activeTab==="penjualan"){
      const rows = sales.filter(s=>(s.tanggal||"").startsWith(bulan));
      const total = rows.reduce((a,b)=>a+Number(b.total||0),0);
      body.innerHTML=`
        <div class="report-grid">
          <div class="report-card"><div class="rc-label">Total Transaksi</div><div class="rc-value num">${rows.length}</div></div>
          <div class="report-card"><div class="rc-label">Total Nilai</div><div class="rc-value num" style="color:var(--primary)">${fmtIDR(total)}</div></div>
          <div class="report-card"><div class="rc-label">Rata-rata / Transaksi</div><div class="rc-value num">${rows.length?fmtIDR(Math.round(total/rows.length)):fmtIDR(0)}</div></div>
        </div>
        ${txTable(rows,"Penjualan")}`;
      root.querySelector("#rpt-export").onclick=()=>csvTx(rows,"penjualan",bulan);
      return;
    }

    if(activeTab==="pembelian"){
      const rows = purchases.filter(p=>(p.tanggal||"").startsWith(bulan));
      const total = rows.reduce((a,b)=>a+Number(b.total||0),0);
      body.innerHTML=`
        <div class="report-grid">
          <div class="report-card"><div class="rc-label">Total Transaksi</div><div class="rc-value num">${rows.length}</div></div>
          <div class="report-card"><div class="rc-label">Total Nilai</div><div class="rc-value num" style="color:var(--blue)">${fmtIDR(total)}</div></div>
          <div class="report-card"><div class="rc-label">Rata-rata / Transaksi</div><div class="rc-value num">${rows.length?fmtIDR(Math.round(total/rows.length)):fmtIDR(0)}</div></div>
        </div>
        ${txTable(rows,"Pembelian")}`;
      root.querySelector("#rpt-export").onclick=()=>csvTx(rows,"pembelian",bulan);
      return;
    }

    if(activeTab==="kas"){
      const rows = cashEntries.filter(c=>(c.tanggal||"").startsWith(bulan));
      const masuk  = rows.filter(r=>r.tipe==="masuk").reduce((a,b)=>a+Number(b.jumlah||0),0);
      const keluar = rows.filter(r=>r.tipe==="keluar").reduce((a,b)=>a+Number(b.jumlah||0),0);
      const saldo  = cashEntries.reduce((a,b)=>a+(b.tipe==="masuk"?1:-1)*Number(b.jumlah||0),0);
      body.innerHTML=`
        <div class="report-grid">
          <div class="report-card"><div class="rc-label">Kas Masuk ${bulan}</div><div class="rc-value num" style="color:var(--primary)">${fmtIDR(masuk)}</div></div>
          <div class="report-card"><div class="rc-label">Kas Keluar ${bulan}</div><div class="rc-value num" style="color:var(--red)">${fmtIDR(keluar)}</div></div>
          <div class="report-card"><div class="rc-label">Saldo Kas (total)</div><div class="rc-value num" style="color:var(--amber)">${fmtIDR(saldo)}</div></div>
        </div>
        <div class="table-wrap">
          <table class="data-table">
            <thead><tr><th>Tanggal</th><th>Tipe</th><th>Kategori</th><th style="text-align:right">Jumlah</th><th>Keterangan</th></tr></thead>

          {key:"jumlah",label:"Jumlah"},{key:"keterangan",label:"Keterangan"}
        ], rows}]);
        toast("Export kas berhasil.");
      };
      return;
    }

    if(activeTab==="piutang"){
      const aktif = receivables.filter(r=>r.status!=="lunas");
      const lunas = receivables.filter(r=>r.status==="lunas");
      const totalAktif = aktif.reduce((a,b)=>a+Number(b.sisa||0),0);
      body.innerHTML=`
        <div class="report-grid">
          <div class="report-card"><div class="rc-label">Piutang Aktif</div><div class="rc-value num" style="color:var(--amber)">${fmtIDR(totalAktif)}</div><div class="rc-sub">${aktif.length} transaksi</div></div>
          <div class="report-card"><div class="rc-label">Sudah Lunas</div><div class="rc-value num">${lunas.length}</div></div>
          <div class="report-card"><div class="rc-label">Total Catatan</div><div class="rc-value num">${receivables.length}</div></div>
        </div>
        ${debtTable(aktif,"Piutang Aktif")}
        ${debtTable(lunas,"Piutang Lunas")}`;
      root.querySelector("#rpt-export").onclick=()=>{
        downloadXLSX(`piutang_${todayStr()}.xlsx`, [{name:"Piutang", headers:[
          {key:"nomorNota",label:"Nomor Nota"},{key:"tanggal",label:"Tanggal"},
          {key:"pihakNama",label:"Pelanggan"},{key:"total",label:"Total"},
          {key:"sisa",label:"Sisa"},{key:"status",label:"Status"}
        ], rows:receivables}]);
        toast("Export piutang berhasil.");
      };
      return;
    }

    if(activeTab==="hutang"){
      const aktif = payables.filter(r=>r.status!=="lunas");
      const lunas = payables.filter(r=>r.status==="lunas");
      const totalAktif = aktif.reduce((a,b)=>a+Number(b.sisa||0),0);
      body.innerHTML=`
        <div class="report-grid">
          <div class="report-card"><div class="rc-label">Hutang Aktif</div><div class="rc-value num" style="color:var(--red)">${fmtIDR(totalAktif)}</div><div class="rc-sub">${aktif.length} transaksi</div></div>
          <div class="report-card"><div class="rc-label">Sudah Lunas</div><div class="rc-value num">${lunas.length}</div></div>
          <div class="report-card"><div class="rc-label">Total Catatan</div><div class="rc-value num">${payables.length}</div></div>
        </div>
        ${debtTable(aktif,"Hutang Aktif")}
        ${debtTable(lunas,"Hutang Lunas")}`;
      root.querySelector("#rpt-export").onclick=()=>{
        downloadXLSX(`hutang_${todayStr()}.xlsx`, [{name:"Hutang", headers:[
          {key:"nomorNota",label:"Nomor Nota"},{key:"tanggal",label:"Tanggal"},
          {key:"pihakNama",label:"Supplier"},{key:"total",label:"Total"},
          {key:"sisa",label:"Sisa"},{key:"status",label:"Status"}
        ], rows:payables}]);
        toast("Export hutang berhasil.");
      };
    }
  }

  function txTable(rows, label){
    return `
      <div class="table-wrap">
        <table class="data-table">
          <thead><tr><th>Nota</th><th>Tanggal</th><th>Pihak</th><th style="text-align:right">Total</th><th>Metode</th></tr></thead>
          <tbody>${rows.sort((a,b)=>(b.tanggal||"").localeCompare(a.tanggal||"")).map(r=>`
            <tr><td>${r.nomorNota||"-"}</td><td>${r.tanggal||"-"}</td><td>${r.pihakNama||"-"}</td>
            <td class="num" style="text-align:right;font-weight:700;">${fmtIDR(r.total)}</td>
            <td>${r.metode||"-"}</td></tr>`).join("")||`<tr><td colspan="5" class="empty-cell" style="padding:24px;text-align:center;">Tidak ada data.</td></tr>`}
          </tbody>
        </table>
      </div>`;
  }
  function debtTable(rows, label){
    if(!rows.length) return "";
    return `
      <div class="section" style="margin-top:12px;">
        <div class="section-head"><h3>${label}</h3></div>
        <div class="table-wrap">
          <table class="data-table">
            <thead><tr><th>Nota</th><th>Tanggal</th><th>Pihak</th><th style="text-align:right">Total</th><th style="text-align:right">Sisa</th></tr></thead>
            <tbody>${rows.map(r=>`
              <tr><td>${r.nomorNota||"-"}</td><td>${r.tanggal||"-"}</td><td>${r.pihakNama||"-"}</td>
              <td class="num" style="text-align:right;">${fmtIDR(r.total)}</td>
              <td class="num" style="text-align:right;font-weight:700;">${fmtIDR(r.sisa)}</td></tr>`).join("")}
            </tbody>
          </table>
        </div>
      </div>`;
  }
  function csvTx(rows,prefix,bulan){
    downloadXLSX(`${prefix}_${bulan}.xlsx`, [{name: prefix==="penjualan"?"Penjualan":"Pembelian", headers:[
      {key:"nomorNota",label:"Nomor Nota"},{key:"tanggal",label:"Tanggal"},
      {key:"pihakNama",label:"Pihak"},{key:"total",label:"Total"},
      {key:"metode",label:"Metode"},{key:"catatan",label:"Catatan"}
    ], rows}]);
    toast(`Export ${prefix} berhasil.`);
  }

  renderReportBody();
}

        </button>
      </div>
      <div class="backup-card">
        <div style="display:flex;align-items:center;gap:10px;">
          <div class="backup-card-icon">${iconSvg("upload")}</div>
          <h4>Import / Restore Data</h4>
        </div>
        <p>Pulihkan dari file JSON backup. Data yang sudah ada akan <strong>ditimpa</strong>. Pastikan file dari Ryou Accounting.</p>
        <button class="btn" id="bk-import">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;"><path d="M12 21V9"/><path d="M7 14l5-5 5 5"/><path d="M4 5h16"/></svg>
          Import JSON
        </button>
      </div>
      <div class="backup-card">
        <div style="display:flex;align-items:center;gap:10px;">
          <div class="backup-card-icon">${iconSvg("sheet")}</div>
          <h4>Export ke Excel</h4>
        </div>
        <p>Semua modul dalam <strong>satu file .xlsx</strong>, sheet terpisah per modul — langsung bisa dibuka di Excel, Google Sheets, atau WPS.</p>
        <button class="btn btn-primary" id="bk-xls-all">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;"><path d="M12 3v12"/><path d="M7 10l5 5 5-5"/><path d="M4 19h16"/></svg>
          Export Semua ke Excel

        <div style="margin-top:2px;font-size:11px;color:var(--text-soft);">9 sheet: Pelanggan, Supplier, Produk, Penjualan, Pembelian, Kas, Bank, Piutang, Hutang</div>

    <div class="bk-section-title" style="color:var(--red);margin-top:24px;">Zona Berbahaya</div>

    <div id="bk-status" style="margin-top:16px;"></div>

  root.querySelector("#bk-xls-all").addEventListener("click",async()=>{

      dbGetAll("sales"),dbGetAll("purchases"),dbGetAll("cashEntries"),
      dbGetAll("bankMutations"),dbGetAll("receivables"),dbGetAll("payables")
    ]);
    const sheets=[
      {name:"Pelanggan",headers:[{key:"id",label:"ID"},{key:"nama",label:"Nama"},{key:"alamat",label:"Alamat"},{key:"telepon",label:"Telepon"},{key:"catatan",label:"Catatan"}],rows:customers},
      {name:"Supplier",headers:[{key:"id",label:"ID"},{key:"nama",label:"Nama"},{key:"alamat",label:"Alamat"},{key:"telepon",label:"Telepon"},{key:"catatan",label:"Catatan"}],rows:suppliers},
      {name:"Produk",headers:[{key:"id",label:"ID"},{key:"kode",label:"Kode"},{key:"nama",label:"Nama"},{key:"kategori",label:"Kategori"},{key:"hargaBeli",label:"Harga Beli"},{key:"hargaToko",label:"Harga Toko"},{key:"hargaJual1",label:"Harga Jual 1"},{key:"hargaJual2",label:"Harga Jual 2"},{key:"stok",label:"Stok"},{key:"satuan",label:"Satuan"},{key:"stokMinimal",label:"Stok Minimal"},{key:"supplierNama",label:"Supplier"},{key:"tanggalMasuk",label:"Tgl Masuk"}],rows:products},
      {name:"Penjualan",headers:[{key:"id",label:"ID"},{key:"nomorNota",label:"Nomor Nota"},{key:"nomorPO",label:"No. P/O"},{key:"tanggal",label:"Tanggal"},{key:"pihakNama",label:"Pelanggan"},{key:"subtotal",label:"Subtotal"},{key:"diskon",label:"Diskon"},{key:"pajak",label:"Pajak"},{key:"total",label:"Total"},{key:"metode",label:"Metode"},{key:"status",label:"Status"}],rows:sales},
      {name:"Pembelian",headers:[{key:"id",label:"ID"},{key:"nomorNota",label:"Nomor Nota"},{key:"nomorPO",label:"No. P/O"},{key:"tanggal",label:"Tanggal"},{key:"pihakNama",label:"Supplier"},{key:"subtotal",label:"Subtotal"},{key:"diskon",label:"Diskon"},{key:"pajak",label:"Pajak"},{key:"total",label:"Total"},{key:"metode",label:"Metode"},{key:"status",label:"Status"}],rows:purchases},
      {name:"Kas",headers:[{key:"id",label:"ID"},{key:"tanggal",label:"Tanggal"},{key:"tipe",label:"Tipe"},{key:"kategori",label:"Kategori"},{key:"jumlah",label:"Jumlah"},{key:"keterangan",label:"Keterangan"}],rows:cashEntries},
      {name:"Mutasi Bank",headers:[{key:"id",label:"ID"},{key:"bankId",label:"Bank ID"},{key:"tanggal",label:"Tanggal"},{key:"tipe",label:"Tipe"},{key:"jumlah",label:"Jumlah"},{key:"keterangan",label:"Keterangan"}],rows:bankMutations},
      {name:"Piutang",headers:[{key:"id",label:"ID"},{key:"nomorNota",label:"Nota"},{key:"tanggal",label:"Tanggal"},{key:"pihakNama",label:"Pelanggan"},{key:"total",label:"Total"},{key:"sisa",label:"Sisa"},{key:"status",label:"Status"}],rows:receivables},
      {name:"Hutang",headers:[{key:"id",label:"ID"},{key:"nomorNota",label:"Nota"},{key:"tanggal",label:"Tanggal"},{key:"pihakNama",label:"Supplier"},{key:"total",label:"Total"},{key:"sisa",label:"Sisa"},{key:"status",label:"Status"}],rows:payables},
    ];
    const total=sheets.reduce((a,s)=>a+s.rows.length,0);
    exportMultiSheetXLS(sheets,`ryou_export_${todayStr()}`);
    toast(`Export Excel berhasil — ${total} total baris, ${sheets.length} sheet.`);
  });

  /* Full JSON export */
  root.querySelector("#bk-export").addEventListener("click",async()=>{
    const allStores = STORES.map(s=>s.name);
    const data = {};
    for(const s of allStores) data[s] = await dbGetAll(s);
    data._version = DB_VERSION;
    data._exported = new Date().toISOString();
    const json = JSON.stringify(data, null, 2);
    downloadTextFile(`ryou_backup_${todayStr()}.json`, json, "application/json;charset=utf-8;");
    const totalRows = Object.values(data).filter(v=>Array.isArray(v)).reduce((a,v)=>a+v.length,0);
    toast(`Backup berhasil — ${totalRows} total record.`);
  });

  /* JSON import */
  root.querySelector("#bk-import").addEventListener("click",()=>{
    if(!confirm("Import akan menimpa data yang ada. Lanjutkan?")) return;
    const input = document.createElement("input");
    input.type="file"; input.accept=".json,application/json";
    input.addEventListener("change",async()=>{
      const file=input.files[0]; if(!file) return;
      const reader=new FileReader();
      reader.onload=async(e)=>{
        try{
          const data=JSON.parse(e.target.result);
          let total=0;
          for(const s of STORES){
            if(Array.isArray(data[s.name])){
              const tx=dbInstance.transaction(s.name,"readwrite");
              const store=tx.objectStore(s.name);
              await new Promise(res=>{ store.clear().onsuccess=res; });
              for(const row of data[s.name]){
                await new Promise((res,rej)=>{ const r=store.put(row); r.onsuccess=res; r.onerror=rej; });
                total++;
              }
            }
          }
          toast(`Restore berhasil — ${total} record dipulihkan.`);
          setTimeout(()=>navigateTo("dashboard"),800);
        }catch(err){
          console.error(err);
          toast("Gagal membaca file backup.");
        }
      };
      reader.readAsText(file,"UTF-8");
    });
    input.click();
  });

  /* Reset */
  root.querySelector("#bk-reset").addEventListener("click",async()=>{
    if(!confirm("HAPUS SEMUA DATA? Tindakan ini tidak bisa dibatalkan!")) return;
    if(!confirm("Yakin? Semua transaksi, produk, pelanggan, kas, dll akan hilang.")) return;
    for(const s of STORES){
      const tx=dbInstance.transaction(s.name,"readwrite");
      tx.objectStore(s.name).clear();
    }
    toast("Semua data dihapus.");
    setTimeout(()=>navigateTo("dashboard"),800);
  });
}

    const kasAwalVal = Number(root.querySelector("#cfg-kasAwal").value)||0;
    const kasAwalTgl = root.querySelector("#cfg-kasAwalTgl").value || todayStr();
    await saveSetting("kasAwal",    kasAwalVal);
    await saveSetting("kasAwalTgl", kasAwalTgl);
    /* Cari atau buat entry kas "Saldo Awal" */
    const allCash = await dbGetAll("cashEntries");
    const existing = allCash.find(c=>c.kategori==="Saldo Awal");
    if(existing){
      existing.jumlah  = kasAwalVal;
      existing.tanggal = kasAwalTgl;
      await dbPut("cashEntries", existing);
    } else if(kasAwalVal > 0){
      await dbAdd("cashEntries",{
        tanggal: kasAwalTgl, tipe:"masuk",
        kategori:"Saldo Awal", jumlah:kasAwalVal,

    if(typeof updateFabMode === "function") await updateFabMode();

    toast("Pengaturan disimpan.");
    navigateTo("settings");
  });
}

async function renderKasirPage(root){
  const products = await dbGetAll("products");
  const byBarcode = {}, byKode = {};
  products.forEach(p=>{
    if(p.barcode) byBarcode[String(p.barcode).trim().toLowerCase()] = p;
    if(p.kode)    byKode[String(p.kode).trim().toLowerCase()] = p;
  });
  let cart = []; // {prodId, nama, qty, harga, subtotal}
  let metode = "Cash";

  root.innerHTML = `
    <div class="ks-search-wrap">
      <div class="ks-scan-box">
        ${iconSvg("barcode")}
        <input id="ks-barcode" type="text" placeholder="Scan barcode, atau ketik nama/kode barang..." autocomplete="off">
      </div>
      <div id="ks-suggest" class="ks-suggest"></div>
    </div>
    <div id="ks-empty" class="ks-empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" style="width:40px;height:40px;"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      <div>Keranjang kosong. Scan produk, atau ketik nama/kode untuk cari.</div>
    </div>
    <div id="ks-cart-list"></div>
    <div class="ks-footer">
      <div class="ks-metode-row">
        <button class="btn btn-sm btn-primary ks-metode-btn" data-m="Cash">Cash</button>
        <button class="btn btn-sm ks-metode-btn" data-m="Transfer">Transfer</button>
      </div>
      <div class="ks-total-row">
        <span>Total</span>
        <span id="ks-total" class="num">${fmtIDRHtml(0)}</span>
      </div>
      <button class="btn btn-primary ks-pay-btn" id="ks-pay" disabled>Selesaikan Penjualan</button>
    </div>
  `;

  const barcodeInput = root.querySelector("#ks-barcode");
  const suggestBox   = root.querySelector("#ks-suggest");
  const listEl  = root.querySelector("#ks-cart-list");
  const emptyEl = root.querySelector("#ks-empty");
  const totalEl = root.querySelector("#ks-total");
  const payBtn  = root.querySelector("#ks-pay");
  let suggestions = [];
  let highlightIdx = -1;

  function findProduct(code){
    const key = code.trim().toLowerCase();
    if(!key) return null;
    return byBarcode[key] || byKode[key] || null;
  }

  /* Cari produk dari barcode/kode/nama (cocok persis diprioritaskan, lalu cocok sebagian) */
  function searchProducts(q){
    const key = q.trim().toLowerCase();
    if(!key) return [];
    const exact = [], partial = [];
    products.forEach(p=>{
      const barcode = String(p.barcode||"").toLowerCase();
      const kode    = String(p.kode||"").toLowerCase();
      const nama    = String(p.nama||"").toLowerCase();
      if(barcode===key || kode===key){ exact.push(p); return; }
      if(barcode.includes(key) || kode.includes(key) || nama.includes(key)) partial.push(p);
    });
    return [...exact, ...partial].slice(0,8);
  }

  function renderSuggestions(){
    if(!suggestions.length){ suggestBox.style.display="none"; suggestBox.innerHTML=""; return; }
    suggestBox.style.display="block";
    suggestBox.innerHTML = suggestions.map((p,i)=>`
      <div class="ks-suggest-item ${i===highlightIdx?"active":""}" data-idx="${i}">
        <div class="ks-suggest-nama">${p.nama}</div>
        <div class="ks-suggest-meta">${p.kode||"-"}${p.barcode?" &middot; "+p.barcode:""} &middot; ${fmtIDR(Number(p.hargaJual1??p.hargaJual??0))} &middot; Stok ${Number(p.stok||0)}</div>
      </div>`).join("");
    suggestBox.querySelectorAll(".ks-suggest-item").forEach(el=>{
      el.addEventListener("mousedown", e=>{
        e.preventDefault(); /* cegah blur duluan sebelum klik terbaca */
        selectSuggestion(suggestions[Number(el.dataset.idx)]);
      });
    });
  }

  function closeSuggestions(){
    suggestions = []; highlightIdx = -1; renderSuggestions();
  }

  function selectSuggestion(prod){
    addToCart(prod);
    barcodeInput.value = "";
    closeSuggestions();
    barcodeInput.focus();
  }

  function addToCart(prod){
    const existing = cart.find(it=>it.prodId===prod.id);
    if(existing){
      existing.qty += 1;
      existing.subtotal = existing.qty * existing.harga;
    } else {
      const harga = Number(prod.hargaJual1 ?? prod.hargaJual ?? 0) || 0;
      cart.push({prodId:prod.id, nama:prod.nama, qty:1, harga, subtotal:harga});
    }
    renderCart();
  }

  function renderCart(){
    emptyEl.style.display = cart.length ? "none" : "flex";
    listEl.innerHTML = cart.map((it,i)=>`
      <div class="ks-cart-row" data-idx="${i}">
        <div class="ks-cart-nama">${it.nama}</div>
        <div class="ks-cart-controls">
          <button class="ks-qty-btn ks-qty-minus" type="button">−</button>
          <input class="ks-qty-input" type="number" min="1" value="${it.qty}">
          <button class="ks-qty-btn ks-qty-plus" type="button">+</button>
          <input class="ks-harga-input" type="number" min="0" value="${it.harga}">
          <span class="ks-subtotal num">${fmtIDR(it.subtotal)}</span>
          <button class="ks-del-btn" type="button" title="Hapus">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
          </button>
        </div>
      </div>`).join("");
    listEl.querySelectorAll(".ks-cart-row").forEach(row=>{
      const idx = Number(row.dataset.idx);
      row.querySelector(".ks-qty-minus").addEventListener("click",()=>{
        cart[idx].qty = Math.max(1, cart[idx].qty-1);
        cart[idx].subtotal = cart[idx].qty*cart[idx].harga;
        renderCart();
      });
      row.querySelector(".ks-qty-plus").addEventListener("click",()=>{
        cart[idx].qty += 1;
        cart[idx].subtotal = cart[idx].qty*cart[idx].harga;
        renderCart();
      });
      row.querySelector(".ks-qty-input").addEventListener("change",e=>{
        cart[idx].qty = Math.max(1, Number(e.target.value)||1);
        cart[idx].subtotal = cart[idx].qty*cart[idx].harga;
        renderCart();
      });
      row.querySelector(".ks-harga-input").addEventListener("change",e=>{
        cart[idx].harga = Math.max(0, Number(e.target.value)||0);
        cart[idx].subtotal = cart[idx].qty*cart[idx].harga;
        renderCart();
      });
      row.querySelector(".ks-del-btn").addEventListener("click",()=>{
        cart.splice(idx,1);
        renderCart();
      });
    });
    const total = cart.reduce((a,it)=>a+it.subtotal,0);
    totalEl.innerHTML = fmtIDRHtml(total);
    payBtn.disabled = cart.length === 0;
  }

  barcodeInput.addEventListener("input", ()=>{
    suggestions = searchProducts(barcodeInput.value);
    highlightIdx = suggestions.length ? 0 : -1;
    renderSuggestions();
  });

  barcodeInput.addEventListener("keydown", e=>{
    if(e.key === "ArrowDown"){
      if(suggestions.length){ e.preventDefault(); highlightIdx = Math.min(highlightIdx+1, suggestions.length-1); renderSuggestions(); }
      return;
    }
    if(e.key === "ArrowUp"){
      if(suggestions.length){ e.preventDefault(); highlightIdx = Math.max(highlightIdx-1, 0); renderSuggestions(); }
      return;
    }
    if(e.key === "Escape"){ closeSuggestions(); return; }
    if(e.key !== "Enter") return;
    e.preventDefault();
    const code = barcodeInput.value;
    if(!code.trim()) return;
    /* Prioritas: cocok persis barcode/kode (jalur scan cepat) */
    const exact = findProduct(code);
    if(exact){ selectSuggestion(exact); return; }
    /* Lalu: item yang sedang di-highlight dari daftar saran nama/kode */
    if(suggestions.length && highlightIdx>=0){ selectSuggestion(suggestions[highlightIdx]); return; }
    toast(`Produk dengan barcode/kode/nama "${code}" tidak ditemukan.`);
    barcodeInput.value = "";
    barcodeInput.focus();
  });

  barcodeInput.addEventListener("focus", ()=>{
    if(barcodeInput.value.trim()){
      suggestions = searchProducts(barcodeInput.value);
      highlightIdx = suggestions.length ? 0 : -1;
      renderSuggestions();
    }
  });
  barcodeInput.addEventListener("blur", ()=>{
    setTimeout(closeSuggestions, 150); /* delay agar klik saran sempat kebaca dulu */
  });

  root.querySelectorAll(".ks-metode-btn").forEach(btn=>{
    btn.addEventListener("click",()=>{
      metode = btn.dataset.m;
      root.querySelectorAll(".ks-metode-btn").forEach(b=>b.classList.toggle("btn-primary", b===btn));
      barcodeInput.focus();
    });
  });

  payBtn.addEventListener("click", async ()=>{
    if(!cart.length) return;
    payBtn.disabled = true;
    try{
      const total = cart.reduce((a,it)=>a+it.subtotal,0);
      const nomorNota = await nextNotaNumber("sales");
      const rec = {
        nomorNota, nomorPO:"",
        tanggal: todayStr(), pihakId:null, pihakNama:"Umum (Kasir)",
        items: cart.map(it=>({prodId:it.prodId, nama:it.nama, qty:it.qty, harga:it.harga, subtotal:it.subtotal})),
        subtotal: total, diskon:0, pajak:0, total, metode, status:"aktif",
        jatuhTempo:"", catatan:"Dibuat via Kasir",
        dibuatPada: new Date().toISOString()
      };
      const newId = await dbAdd("sales", rec);
      rec.id = newId;
      /* Kurangi stok produk */
      const prodList = await dbGetAll("products");
      const prodById = {}; prodList.forEach(p=>prodById[p.id]=p);
      for(const it of rec.items){
        const p = it.prodId && prodById[it.prodId];
        if(!p) continue;
        p.stok = Math.max(0, (Number(p.stok)||0) - Number(it.qty));
        await dbPut("products", p);
      }
      /* Catat kas (konsisten dgn modul Penjualan: hanya metode Cash yg tercatat di Kas Tunai) */
      rec.cashEntryId = null;
      if(metode === "Cash"){
        rec.cashEntryId = await dbAdd("cashEntries",{
          tanggal: rec.tanggal, tipe:"masuk",
          kategori:"Penjualan Cash", jumlah: total, keterangan: rec.nomorNota
        });
      }
      await dbPut("sales", rec);

      toast(`✓ ${rec.nomorNota} — ${fmtIDR(total)} tersimpan. Siap untuk nota berikutnya.`);
      cart = [];
      renderCart();
    } catch(err){
      console.error(err);
      toast("Gagal menyimpan penjualan.");
    } finally {
      payBtn.disabled = cart.length === 0;
      barcodeInput.value = "";
      closeSuggestions();
      barcodeInput.focus();
    }
  });

  renderCart();
  barcodeInput.focus();
}

async function renderDashboard(root){
  const [salesRaw, purchasesRaw, cashEntries, receivables, payables] = await Promise.all([
    dbGetAll("sales"), dbGetAll("purchases"), dbGetAll("cashEntries"),
    dbGetAll("receivables"), dbGetAll("payables")
  ]);
  /* Nota berstatus "dibatalkan" tetap tersimpan sbg riwayat, tapi tidak dihitung di statistik */
  const sales = salesRaw.filter(s=>s.status!=="dibatalkan");
  const purchases = purchasesRaw.filter(p=>p.status!=="dibatalkan");
  const today = todayStr();
  const thisMonth = today.slice(0,7);

  const sumWhere = (arr, pred, field) => arr.filter(pred).reduce((a,b)=> a + (Number(b[field])||0), 0);

  const salesToday = sumWhere(sales, s => s.tanggal === today, "total");
  const purchasesToday = sumWhere(purchases, p => p.tanggal === today, "total");
  const kasMasuk = sumWhere(cashEntries, c => c.tanggal === today && c.tipe === "masuk", "jumlah");
  const kasKeluar = sumWhere(cashEntries, c => c.tanggal === today && c.tipe === "keluar", "jumlah");
  const saldoKas = sumWhere(cashEntries, c => c.tipe === "masuk", "jumlah") - sumWhere(cashEntries, c => c.tipe === "keluar", "jumlah");
  const piutangAktif = receivables.filter(r => r.status !== "lunas").reduce((a,b)=> a + (Number(b.sisa)||0), 0);
  const hutangAktif = payables.filter(p => p.status !== "lunas").reduce((a,b)=> a + (Number(b.sisa)||0), 0);
  const labaHariIni = salesToday - purchasesToday;
  const labaBulanIni = sumWhere(sales, s => (s.tanggal||"").slice(0,7) === thisMonth, "total")
                      - sumWhere(purchases, p => (p.tanggal||"").slice(0,7) === thisMonth, "total");

  const stats = [
    { label:"Penjualan Hari Ini", value: fmtIDRHtml(salesToday), cls:"" },
    { label:"Pembelian Hari Ini", value: fmtIDRHtml(purchasesToday), cls:"acc-blue" },
    { label:"Kas Masuk", value: fmtIDRHtml(kasMasuk), cls:"" },
    { label:"Kas Keluar", value: fmtIDRHtml(kasKeluar), cls:"acc-red" },
    { label:"Saldo Kas", value: fmtIDRHtml(saldoKas), cls:"acc-amber" },
    { label:"Piutang Aktif", value: fmtIDRHtml(piutangAktif), cls:"acc-blue" },
    { label:"Hutang Aktif", value: fmtIDRHtml(hutangAktif), cls:"acc-red" },
    { label:"Laba Hari Ini", value: fmtIDRHtml(labaHariIni), cls:"" },
    { label:"Laba Bulan Ini", value: fmtIDRHtml(labaBulanIni), cls:"acc-amber" }
  ];

  root.innerHTML = `
    <div class="stat-grid">
      ${stats.map(s => `
        <div class="stat-card ${s.cls}">
          <div class="stat-label">${s.label}</div>
          <div class="stat-value num">${s.value}</div>
        </div>`).join("")}
    </div>
    <div class="section">
      <div class="section-head"><h3>Transaksi Terbaru</h3></div>
      <div id="recent-tx-holder"></div>
    </div>
  `;

  const recentHolder = root.querySelector("#recent-tx-holder");
  if(sales.length === 0 && purchases.length === 0){
    recentHolder.innerHTML = `
      <div class="empty-state">
        ${iconSvg("invoice")}
        <div class="et-title">Belum ada transaksi</div>
        <div class="et-sub">Transaksi penjualan & pembelian yang baru dicatat akan muncul di sini.</div>
      </div>`;
  } else {
    const merged = [
      ...sales.map(s => ({...s, _type:"Penjualan"})),
      ...purchases.map(p => ({...p, _type:"Pembelian"}))
    ].sort((a,b)=> (b.tanggal||"").localeCompare(a.tanggal||"")).slice(0,8);
    recentHolder.innerHTML = `<div style="display:flex;flex-direction:column;gap:8px;">` +
      merged.map(tx => `
        <div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px;">
          <span>${tx._type} &middot; ${tx.nomorNota || "-"}</span>
          <span class="num" style="font-weight:700;">${fmtIDR(tx.total)}</span>
        </div>`).join("") + `</div>`;
  }
}

/* Tombol "Install" manual di Settings — nangkep event beforeinstallprompt
   Chrome/Edge supaya pengguna nggak perlu nyari sendiri di menu ⋮ browser.
   Kalau event ini belum/nggak pernah muncul (kriteria PWA belum terpenuhi,
   atau browser-nya nggak dukung kayak Safari), tombol tetap ada tapi
   nunjukin instruksi manual pas ditekan. */
let deferredInstallPrompt = null;
let appAlreadyInstalled = window.matchMedia("(display-mode: standalone)").matches;
window.addEventListener("beforeinstallprompt", (e)=>{
  e.preventDefault();
  deferredInstallPrompt = e;
  renderInstallButtonState();
});
window.addEventListener("appinstalled", ()=>{
  deferredInstallPrompt = null;
  appAlreadyInstalled = true;
  renderInstallButtonState();
  toast("Aplikasi berhasil di-install.");
});
function renderInstallButtonState(root){
  const scope = root || document;
  const btn = scope.querySelector("#install-app-btn");
  const sub = scope.querySelector("#install-app-sub");
  if(!btn) return;
  if(appAlreadyInstalled){
    btn.querySelector("svg").outerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>';
    btn.lastChild.textContent = " Terinstall";
    btn.disabled = true;
    if(sub) sub.textContent = "Aplikasi sudah terpasang di perangkat ini.";
  }else if(deferredInstallPrompt){
    if(sub) sub.textContent = "Siap dipasang — tinggal tap tombol di samping.";
  }
}
async function triggerInstallPrompt(){
  if(appAlreadyInstalled) return;
  if(deferredInstallPrompt){
    deferredInstallPrompt.prompt();
    await deferredInstallPrompt.userChoice;
    deferredInstallPrompt = null;
    return;
  }
  const ua = navigator.userAgent || "";
  if(/iphone|ipad|ipod/i.test(ua)){
    toast('Di iPhone/iPad: tap ikon Share di Safari, lalu pilih "Add to Home Screen".');
  }else if(/android/i.test(ua)){
    toast('Belum terdeteksi installable otomatis. Coba tap menu ⋮ Chrome → "Install app". Kalau nggak ada, refresh halaman ini dulu.');
  }else{
    toast('Buka menu browser (biasanya ikon ⋮ atau ⊕ di address bar) → cari "Install [App]" atau "Create shortcut".');
  }
}
</script>
