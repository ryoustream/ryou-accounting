    /* Balikkan efek stok/kas/hutang-piutang dari sebuah record — dipakai saat
       pembatalan ATAU sebelum menerapkan ulang hasil edit. */
    async function reverseSideEffects(r){
      const prodList = await dbGetAll("products");
      const prodById = {}; const prodByNameLow = {};
      prodList.forEach(p=>{
        prodById[p.id]=p;
        prodByNameLow[p.nama.trim().toLowerCase()]=p;
        if(p.kode) prodByNameLow[p.kode.trim().toLowerCase()]=p;
      });
      for(const it of (r.items||[])){
        const prod = (it.prodId && prodById[it.prodId]) || prodByNameLow[String(it.nama||"").trim().toLowerCase()];
        if(!prod) continue;
        prod.stok = Math.max(0, (Number(prod.stok)||0) + (isSales ? Number(it.qty) : -Number(it.qty)));
        await dbPut("products", prod);
      }
      if(r.cashEntryId){
        try{ await dbDelete("cashEntries", r.cashEntryId); }catch(e){ /* entri mungkin sudah dihapus manual */ }
      }
      let debtWarning = false;
      if(r.debtId){
        const debt = await dbGet(debtStore, r.debtId);
        if(debt){
          if(Number(debt.sisa) === Number(debt.total)){
            await dbDelete(debtStore, r.debtId);
          } else {
            debtWarning = true;
          }
        }
      }
      return { debtWarning };
    }

    /* Terapkan efek stok/kas/hutang-piutang utk record baru/hasil edit.
       Mengisi rec.debtId & rec.cashEntryId sesuai metode pembayaran saat ini. */
    async function applySideEffects(rec){
      const prodList = await dbGetAll("products");
      const prodById  = {};
      const prodByNameLow = {};
      prodList.forEach(p=>{
        prodById[p.id] = p;
        prodByNameLow[p.nama.trim().toLowerCase()] = p;
        if(p.kode) prodByNameLow[p.kode.trim().toLowerCase()] = p;
      });
      for(const it of rec.items){
        const prod = (it.prodId && prodById[it.prodId])
                   || prodByNameLow[it.nama.trim().toLowerCase()];
        if(!prod) continue;
        prod.stok = Math.max(0, (Number(prod.stok)||0) + (isSales ? -Number(it.qty) : +Number(it.qty)));
        if(!isSales){
          prod.hargaBeli   = Number(it.harga) || prod.hargaBeli;
          prod.supplierNama = rec.pihakNama || prod.supplierNama;
          prod.tanggalMasuk = rec.tanggal;
        }
        await dbPut("products", prod);
      }
      rec.debtId = null;
      if(rec.metode === "Kredit"){
        const debtRec = {
          refId: rec.id, nomorNota: rec.nomorNota, tanggal: rec.tanggal,
          pihakId: rec.pihakId, pihakNama: rec.pihakNama, total: rec.total, sisa: rec.total,
          jatuhTempo: rec.jatuhTempo||"", status:"belum", catatan: rec.catatan, riwayat:[]
        };
        if(isSales) debtRec.pelangganId = rec.pihakId;
        else        debtRec.supplierId  = rec.pihakId;
        rec.debtId = await dbAdd(debtStore, debtRec);
      }
      rec.cashEntryId = null;
      if(rec.metode === "Cash"){
        rec.cashEntryId = await dbAdd("cashEntries",{
          tanggal: rec.tanggal, tipe: isSales?"masuk":"keluar",
          kategori: isSales?"Penjualan Cash":"Pembelian Cash",
          jumlah: rec.total, keterangan: rec.nomorNota
        });
      }
    }

        </div>
        <div class="field">
          <label>Tanggal *</label><input id="f-tgl" type="date" value="${isEdit?existing.tanggal:todayStr()}">
        </div>
        <div class="field">
          <label>${pihakLabel}</label>
          <select id="f-pihak">
            <option value="">-- Pilih ${pihakLabel} --</option>
            ${allPihak.map(p=>`<option value="${p.id}" data-nama="${p.nama}" ${isEdit&&existing.pihakId===p.id?"selected":""}>${p.nama}</option>`).join("")}
          </select>
        </div>
        <div class="field">
          <label>Item / Barang</label>
          <div id="items-wrap" style="display:flex;flex-direction:column;gap:6px;"></div>
          <button type="button" class="btn btn-sm" id="add-item-btn" style="margin-top:6px;align-self:flex-start;">+ Tambah Item</button>
        </div>
        <div class="field-row">
          <div class="field"><label>Diskon (Rp)</label><input id="f-diskon" type="number" value="${isEdit?(existing.diskon||0):0}" min="0"></div>
          <div class="field"><label>Pajak (Rp)</label><input id="f-pajak" type="number" value="${isEdit?(existing.pajak||0):0}" min="0"></div>
        </div>
        <div class="field">
          <label>Metode Pembayaran *</label>
          <select id="f-metode">
            <option ${isEdit&&existing.metode==="Cash"?"selected":""}>Cash</option>
            <option ${isEdit&&existing.metode==="Transfer"?"selected":""}>Transfer</option>
            <option ${isEdit&&existing.metode==="Kredit"?"selected":""}>Kredit</option>
          </select>
        </div>
        <div class="field" id="f-jt-wrap" style="display:${isEdit&&existing.metode==="Kredit"?"flex":"none"};">
          <label>Jatuh Tempo Kredit</label>
          <input id="f-jatuhTempo" type="date" value="${isEdit?(existing.jatuhTempo||''):''}">
          <div class="field-hint">Kosongkan jika tidak ada batas waktu.</div>
        </div>
        <div class="field"><label>Catatan</label><textarea id="f-catatan" rows="2">${isEdit?(existing.catatan||''):''}</textarea></div>
        ${isEdit?`<div class="field-hint" style="margin-top:-6px;">Nota bisa diedit sampai 3 hari sejak dibuat. Mengubah item/metode akan menyesuaikan ulang stok, kas, dan hutang/piutang secara otomatis.</div>`:""}
        <div style="text-align:right;font-size:13px;font-weight:700;">Total: <span id="f-total-display" class="num">${fmtIDRHtml(0)}</span></div>
      `;
      const modal = openModal(isEdit?`Edit ${title} — ${existing.nomorNota}`:`Tambah ${title}`, bodyHtml,
        `<button class="btn" id="modal-cancel">Batal</button><button class="btn btn-primary" id="modal-save">Simpan</button>`
      );
      const wrap = modal.querySelector("#items-wrap");
      function refreshItems(){
        wrap.innerHTML = itemsHtml();
        wrap.querySelectorAll(".del-item").forEach(btn=>{
          btn.addEventListener("click",()=>{
            items.splice(Number(btn.closest(".item-row").dataset.idx),1);
            refreshItems(); calcTotal();
          });
        });
        wrap.querySelectorAll(".item-nama").forEach((inp,i)=>{
          const setFromProd = ()=>{
            const key = inp.value.trim().toLowerCase();
            const prod = prodByNama[key] || prodByKode[key];
            if(prod){
              /* Store prodId in hidden field */
              inp.closest(".item-row").querySelector(".item-prodid").value = prod.id;
              items[i].prodId = prod.id;
              const hField = inp.closest(".item-row").querySelector(".item-harga");
              if(hField && Number(hField.value)===0){
                hField.value = isSales ? (prod.hargaJual1 ?? prod.hargaJual ?? 0) : (prod.hargaBeli||0);
              }
              syncItems(); calcTotal();
            }
          };
          inp.addEventListener("change", setFromProd);
          inp.addEventListener("input", ()=>{
            /* Clear prodId if user edits manually */
            inp.closest(".item-row").querySelector(".item-prodid").value = "";
            items[i].prodId = null;
            syncItems();
          });
        });
        wrap.querySelectorAll(".item-qty,.item-harga").forEach(inp=>{
          inp.addEventListener("input", syncItems);
        });
      }
      function syncItems(){
        wrap.querySelectorAll(".item-row").forEach((row,i)=>{
          items[i].prodId   = Number(row.querySelector(".item-prodid").value)||null;
          items[i].nama     = row.querySelector(".item-nama").value;
          items[i].qty      = Number(row.querySelector(".item-qty").value)||1;
          items[i].harga    = Number(row.querySelector(".item-harga").value)||0;
          items[i].subtotal = items[i].qty * items[i].harga;
        });
        calcTotal();
      }
      function calcTotal(){
        const sub = items.reduce((a,it)=>a+it.subtotal,0);
        const disc= Number(modal.querySelector("#f-diskon").value)||0;
        const tax = Number(modal.querySelector("#f-pajak").value)||0;
        modal.querySelector("#f-total-display").innerHTML = fmtIDRHtml(sub - disc + tax);
      }
      modal.querySelector("#add-item-btn").addEventListener("click",()=>{
        items.push({nama:"",qty:1,harga:0,subtotal:0});
        refreshItems(); calcTotal();
      });
      modal.querySelector("#f-diskon").addEventListener("input", calcTotal);
      modal.querySelector("#f-pajak").addEventListener("input", calcTotal);
      modal.querySelector("#f-metode").addEventListener("change", function(){
        modal.querySelector("#f-jt-wrap").style.display = this.value==="Kredit" ? "flex" : "none";
      });
      modal.querySelector("#modal-cancel").addEventListener("click", closeModal);
      modal.querySelector("#modal-save").addEventListener("click", async ()=>{
        syncItems();
        const tanggal = modal.querySelector("#f-tgl").value;
        const metode  = modal.querySelector("#f-metode").value;
        if(!tanggal){ toast("Tanggal wajib diisi."); return; }
        if(!items.length){ toast("Tambahkan minimal 1 item."); return; }
        const pihakSel  = modal.querySelector("#f-pihak");
        const pihakId   = Number(pihakSel.value)||null;
        const pihakNama = (pihakId && allPihak.find(p=>p.id===pihakId)?.nama)
                        || pihakSel.options[pihakSel.selectedIndex]?.text?.replace(/^-- .* --$/,"").trim()
                        || "";
        const sub  = items.reduce((a,it)=>a+it.subtotal,0);
        const disc = Number(modal.querySelector("#f-diskon").value)||0;
        const tax  = Number(modal.querySelector("#f-pajak").value)||0;
        const total= sub - disc + tax;
        const jatuhTempo = modal.querySelector("#f-jatuhTempo").value || "";
        const nomorPO = modal.querySelector("#f-po").value.trim();
        const catatan = modal.querySelector("#f-catatan").value.trim();

        if(isEdit){
          if(!isEditable(existing)){ toast("Nota ini sudah terkunci (lewat 3 hari) dan tidak bisa diedit lagi."); return; }
          /* Balikkan efek lama dulu, baru terapkan yang baru */
          const { debtWarning } = await reverseSideEffects(existing);
          existing.nomorPO   = nomorPO;
          existing.tanggal   = tanggal;
          existing.pihakId   = pihakId;
          existing.pihakNama = pihakNama;
          existing.items     = items;
          existing.subtotal  = sub;
          existing.diskon    = disc;
          existing.pajak     = tax;
          existing.total     = total;
          existing.metode    = metode;
          existing.jatuhTempo= jatuhTempo;
          existing.catatan   = catatan;
          existing.dieditPada= new Date().toISOString();
          await applySideEffects(existing);
          await dbPut(storeName, existing);
          allRows = allRows.map(x=>x.id===existing.id?existing:x);
          closeModal();
          renderTable();
          toast(`${title} ${existing.nomorNota} diperbarui.${debtWarning?` (Perhatian: ${isSales?"piutang":"hutang"} lama sudah ada yang dibayar — cek menu manual.)`:""}`);
        } else {
          const nomorNota = await nextNotaNumber(type);
          const rec = {
            nomorNota, nomorPO,
            tanggal, pihakId, pihakNama, items, subtotal:sub,
            diskon:disc, pajak:tax, total, metode, status:"aktif",
            jatuhTempo, catatan,
            dibuatPada: new Date().toISOString()
          };
          const newId = await dbAdd(storeName, rec);
          rec.id = newId;
          allRows.push(rec);
          await applySideEffects(rec);
          /* Simpan referensi cashEntryId/debtId ke record transaksi (dibutuhkan saat edit/pembatalan) */
          await dbPut(storeName, rec);
          closeModal();
          renderTable();
          toast(`${title} ${rec.nomorNota} disimpan.`);
        }
      });
      refreshItems(); calcTotal();
    }

    async function cancelTransaksi(r){
      if(!r || r.status === "dibatalkan"){ toast("Nota ini sudah dibatalkan."); return; }
      if(!confirm(`Batalkan ${title.toLowerCase()} ${r.nomorNota}?\n\nStok, kas, dan hutang/piutang terkait akan disesuaikan otomatis. Nomor nota TIDAK akan dipakai ulang — nota tetap tersimpan dengan status Dibatalkan.`)) return;

      const { debtWarning } = await reverseSideEffects(r);
      if(debtWarning){
        toast(`Perhatian: sebagian ${isSales?"piutang":"hutang"} sudah dibayar — cek menu ${isSales?"Piutang":"Hutang"} secara manual.`);
      }

      /* Tandai nota sebagai dibatalkan (baris tetap ada, nomor tidak diulang) */
      r.status = "dibatalkan";
      r.dibatalkanPada = new Date().toISOString();
      r.cashEntryId = null;
      r.debtId = null;
      await dbPut(storeName, r);
      allRows = allRows.map(x=>x.id===r.id?r:x);
      renderTable();
      toast(`${title} ${r.nomorNota} dibatalkan.`);
    }

    root.querySelector("#tx-search").addEventListener("input", e=>{ query=e.target.value.trim().toLowerCase(); renderTable(); });
    root.querySelector("#tx-filter-metode").addEventListener("change", e=>{ filterMetode=e.target.value; renderTable(); });
    root.querySelector("#tx-filter-bulan").addEventListener("change", e=>{ filterBulan=e.target.value; renderTable(); });
    root.querySelector("#tx-add").addEventListener("click", ()=>openTransaksiModal(null));
    root.querySelector("#tx-export").addEventListener("click", ()=>{
      const rows = filtered().map(r=>({...r, items:JSON.stringify(r.items||[])}));
      if(!rows.length){ toast("Tidak ada data untuk diexport."); return; }
      downloadXLSX(`${csvPrefix}_${todayStr()}.xlsx`, [{name:title, headers:CSV_HEADERS, rows}]);
      toast(`Export ${rows.length} baris berhasil.`);
    });
    renderTable();
  };
}

async function renderCashPage(root){
  let allEntries = await dbGetAll("cashEntries");
  let query="", filterTipe="", filterBulan="";

  const CSV_HEADERS = [
    {key:"id",label:"ID"},{key:"tanggal",label:"Tanggal"},{key:"tipe",label:"Tipe"},
    {key:"kategori",label:"Kategori"},{key:"jumlah",label:"Jumlah"},{key:"keterangan",label:"Keterangan"}
  ];

  root.innerHTML=`
    <div class="crud-toolbar">
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"></circle><path d="M21 21l-4.3-4.3"/></svg>
        <input type="text" id="kas-search" placeholder="Cari keterangan / kategori...">
      </div>
      <div class="select-filter-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3z"/></svg>
        <select id="kas-filter-tipe">
          <option value="">Semua Tipe</option><option value="masuk">Masuk</option><option value="keluar">Keluar</option>
        </select>
      </div>
      <div class="month-filter-box" title="Filter bulan">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        <input type="month" id="kas-filter-bulan">
      </div>
      <span class="count-pill" id="kas-count"></span>
      <button class="btn" id="kas-export"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12"/><path d="M7 10l5 5 5-5"/><path d="M4 19h16"/></svg>Export XLS</button>
      <button class="btn btn-primary" id="kas-add"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 5v14M5 12h14"/></svg>Tambah</button>
    </div>
    <div class="stat-grid" id="kas-stats" style="margin-bottom:14px;"></div>
    <div class="table-wrap"><div id="kas-table-holder"></div></div>
  `;

  function filtered(){
    return allEntries.filter(r=>{
      const q = !query || [r.kategori,r.keterangan].some(v=>String(v||"").toLowerCase().includes(query));
      const t = !filterTipe || r.tipe===filterTipe;
      const b = !filterBulan || (r.tanggal||"").startsWith(filterBulan);
      return q&&t&&b;
    });
  }

  function renderStats(){
    const rows = filtered();
    const masuk  = rows.filter(r=>r.tipe==="masuk").reduce((a,b)=>a+Number(b.jumlah||0),0);
    const keluar = rows.filter(r=>r.tipe==="keluar").reduce((a,b)=>a+Number(b.jumlah||0),0);
    const saldo  = allEntries.reduce((a,b)=>a + (b.tipe==="masuk"?1:-1)*Number(b.jumlah||0),0);
    root.querySelector("#kas-stats").innerHTML=`
      <div class="stat-card"><div class="stat-label">Kas Masuk (filter)</div><div class="stat-value num" style="color:var(--primary)">${fmtIDRHtml(masuk)}</div></div>
      <div class="stat-card acc-red"><div class="stat-label">Kas Keluar (filter)</div><div class="stat-value num">${fmtIDRHtml(keluar)}</div></div>
      <div class="stat-card acc-amber"><div class="stat-label">Saldo Kas (total)</div><div class="stat-value num">${fmtIDRHtml(saldo)}</div></div>
    `;
  }

  function renderTable(){
    renderStats();
    const rows = filtered().sort((a,b)=>(b.tanggal||"").localeCompare(a.tanggal||""));
    root.querySelector("#kas-count").textContent=`${rows.length} dari ${allEntries.length}`;
    const holder = root.querySelector("#kas-table-holder");
    if(!rows.length){
      holder.innerHTML=`<div class="empty-state">${iconSvg("cash")}<div class="et-title">Belum ada mutasi kas</div><div class="et-sub">Catat kas masuk atau keluar secara manual.</div></div>`;
      return;
    }
    holder.innerHTML=`
      <table class="data-table">
        <thead><tr><th>Tanggal</th><th>Tipe</th><th>Kategori</th><th style="text-align:right">Jumlah</th><th>Keterangan</th><th style="text-align:right">Aksi</th></tr></thead>
        <tbody>${rows.map(r=>`
          <tr data-id="${r.id}">
            <td>${r.tanggal||"-"}</td>
            <td><span class="tag-chip" style="${r.tipe==="masuk"?"background:var(--primary-100);color:var(--primary-ink);":"background:var(--red-100);color:var(--red);"}">${r.tipe==="masuk"?"▲ Masuk":"▼ Keluar"}</span></td>
            <td>${r.kategori||"-"}</td>
            <td class="num" style="text-align:right;font-weight:700;color:${r.tipe==="masuk"?"var(--primary-ink)":"var(--red)"};">${fmtIDR(r.jumlah)}</td>
            <td>${r.keterangan||"<span class='empty-cell'>-</span>"}</td>
            <td><div class="row-actions" style="justify-content:flex-end;">
              <button class="act-icon del-btn btn-danger" title="Hapus"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg></button>
            </div></td>
          </tr>`).join("")}
        </tbody>
      </table>`;
    holder.querySelectorAll(".del-btn").forEach(btn=>{
      btn.addEventListener("click",async()=>{
        if(!confirm("Hapus entri kas ini?")) return;
        const id=Number(btn.closest("tr").dataset.id);
        await dbDelete("cashEntries",id);
        allEntries=allEntries.filter(r=>r.id!==id);
        renderTable();
        toast("Entri kas dihapus.");
      });
    });
  }

  function openAddKas(){
    const modal=openModal("Tambah Mutasi Kas",`
      <div class="field-row">
        <div class="field"><label>Tanggal *</label><input id="kf-tgl" type="date" value="${todayStr()}"></div>
        <div class="field"><label>Tipe *</label>
          <select id="kf-tipe"><option value="masuk">Kas Masuk</option><option value="keluar">Kas Keluar</option></select>
        </div>
      </div>
      <div class="field">
        <label>Kategori *</label>
        <input id="kf-kat" type="text" list="kas-kat-list" placeholder="Pilih dari daftar atau ketik kategori sendiri...">
        <datalist id="kas-kat-list">
          <option value="Penjualan Cash">
          <option value="Pembayaran Piutang">
          <option value="Pendapatan Lain">
          <option value="Pembelian Cash">
          <option value="Biaya Operasional">
          <option value="Bayar Hutang">
          <option value="Lainnya">
        </datalist>
      </div>
      <div class="field"><label>Jumlah (Rp) *</label><input id="kf-jml" type="number" min="0" value="0"></div>
      <div class="field"><label>Keterangan</label><input id="kf-ket" type="text"></div>
    `,`<button class="btn" id="modal-cancel">Batal</button><button class="btn btn-primary" id="modal-save">Simpan</button>`);
    modal.querySelector("#modal-cancel").addEventListener("click",closeModal);
    modal.querySelector("#modal-save").addEventListener("click",async()=>{
      const tgl=modal.querySelector("#kf-tgl").value;
      const jml=Number(modal.querySelector("#kf-jml").value)||0;
      const kat=modal.querySelector("#kf-kat").value.trim();
      if(!tgl||!jml||!kat){ toast("Tanggal, kategori & jumlah wajib diisi."); return; }
      const rec={
        tanggal:tgl, tipe:modal.querySelector("#kf-tipe").value,
        kategori:kat,
        jumlah:jml, keterangan:modal.querySelector("#kf-ket").value.trim()
      };
      const id=await dbAdd("cashEntries",rec);
      rec.id=id; allEntries.push(rec);
      closeModal(); renderTable();
      toast("Mutasi kas ditambahkan.");
    });
  }

  root.querySelector("#kas-search").addEventListener("input",e=>{query=e.target.value.trim().toLowerCase();renderTable();});
  root.querySelector("#kas-filter-tipe").addEventListener("change",e=>{filterTipe=e.target.value;renderTable();});
  root.querySelector("#kas-filter-bulan").addEventListener("change",e=>{filterBulan=e.target.value;renderTable();});
  root.querySelector("#kas-add").addEventListener("click",openAddKas);
  root.querySelector("#kas-export").addEventListener("click",()=>{
    const rows=filtered();
    if(!rows.length){toast("Tidak ada data.");return;}
    downloadXLSX(`kas_${todayStr()}.xlsx`, [{name:"Kas Tunai", headers:CSV_HEADERS, rows}]);
    toast(`Export ${rows.length} baris.`);
  });
  renderTable();
}

      `:`<div class="empty-state" style="border:1px dashed var(--border);border-radius:var(--radius-md);padding:40px 20px;">${iconSvg("bank")}<div class="et-title">Belum ada rekening</div><div class="et-sub">Tambahkan rekening bank pertama Anda.</div></div>`}
    `;

    /* Account card events */
    root.querySelectorAll(".sel-acc-btn").forEach(btn=>{
      btn.addEventListener("click",()=>{ selAccId=Number(btn.dataset.id); render(); });
    });
    root.querySelectorAll(".del-acc-btn").forEach(btn=>{
      btn.addEventListener("click",async()=>{
        const id=Number(btn.dataset.id);
        if(!confirm(`Hapus rekening ${accName(id)} beserta semua mutasinya?`)) return;
        await dbDelete("bankAccounts",id);
        for(const m of mutations.filter(x=>x.bankId===id)) await dbDelete("bankMutations",m.id);
        accounts=accounts.filter(a=>a.id!==id);
        mutations=mutations.filter(m=>m.bankId!==id);
        if(selAccId===id) selAccId=accounts[0]?.id||null;
        render(); toast("Rekening dihapus.");
      });
    });

    root.querySelector("#bank-add-acc").addEventListener("click", openAddAcc);
    root.querySelector("#bank-xls").addEventListener("click", exportXLS);
    if(!accounts.length) return;

    root.querySelectorAll(".tab-item").forEach(btn=>{
      btn.addEventListener("click",()=>{
        activeTab=btn.dataset.tab;
        root.querySelectorAll(".tab-item").forEach(b=>b.classList.toggle("active",b===btn));
        const ctrl=root.querySelector("#mutasi-controls");
        if(ctrl) ctrl.style.display=activeTab==="mutasi"?"flex":"none";
        renderTabBody();
      });
    });
    root.querySelector("#bank-sel-acc").addEventListener("change",e=>{ selAccId=Number(e.target.value); renderTabBody(); });
    root.querySelector("#bank-filter-bulan").addEventListener("change",e=>{ filterBulan=e.target.value; renderTabBody(); });
    root.querySelector("#bank-search").addEventListener("input",e=>{ queryMut=e.target.value.trim().toLowerCase(); renderTabBody(); });
    root.querySelector("#bank-add-mut").addEventListener("click", openAddMut);
    renderTabBody();
  }

  /* ---- tab body ---- */
  function renderTabBody(){
    const holder = root.querySelector("#bank-tab-body");
    if(!holder) return;
    if(activeTab==="mutasi") renderMutasi(holder);
    else renderTransfer(holder);
  }

  function renderMutasi(holder){
    let rows = mutations.filter(m=>{
      if(m.bankId!==selAccId) return false;
      if(filterBulan && !(m.tanggal||"").startsWith(filterBulan)) return false;
      if(queryMut && !String(m.keterangan||"").toLowerCase().includes(queryMut)) return false;
      return true;
    }).sort((a,b)=>(a.tanggal||"").localeCompare(b.tanggal||""));

    const masuk  = rows.filter(r=>r.tipe==="masuk").reduce((a,b)=>a+Number(b.jumlah||0),0);
    const keluar = rows.filter(r=>r.tipe==="keluar").reduce((a,b)=>a+Number(b.jumlah||0),0);
    const saldoAcc = saldo(selAccId);

    if(!rows.length){
      holder.innerHTML=`
        <div style="display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap;">
          <div class="stat-card" style="flex:1;min-width:140px;"><div class="stat-label">Saldo Rekening</div><div class="stat-value num" style="font-size:18px;">${fmtIDRHtml(saldoAcc)}</div></div>
        </div>
        <div class="empty-state" style="border:1px dashed var(--border);border-radius:var(--radius-md);padding:30px;">${iconSvg("bank")}<div class="et-title">Belum ada mutasi</div></div>`;
      return;
    }

    /* running balance */
    let running = 0;
    const rowsWithBalance = rows.map(r=>{
      running += (r.tipe==="masuk"?1:-1)*Number(r.jumlah||0);
      return {...r, _running: running};
    }).reverse(); // show newest first after computing balance

    holder.innerHTML=`
      <div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;">
        <div class="stat-card" style="flex:1;min-width:120px;"><div class="stat-label">Saldo</div><div class="stat-value num" style="font-size:18px;color:var(--amber)">${fmtIDRHtml(saldoAcc)}</div></div>
        <div class="stat-card" style="flex:1;min-width:120px;"><div class="stat-label">Masuk (filter)</div><div class="stat-value num" style="font-size:18px;color:var(--primary)">${fmtIDRHtml(masuk)}</div></div>
        <div class="stat-card acc-red" style="flex:1;min-width:120px;"><div class="stat-label">Keluar (filter)</div><div class="stat-value num" style="font-size:18px;">${fmtIDRHtml(keluar)}</div></div>
      </div>
      <div class="table-wrap">
        <table class="data-table">
          <thead><tr><th>Tanggal</th><th>Tipe</th><th style="text-align:right">Jumlah</th><th style="text-align:right">Saldo</th><th>Keterangan</th><th style="text-align:right">Aksi</th></tr></thead>
          <tbody>${rowsWithBalance.map(r=>`
            <tr data-id="${r.id}">
              <td style="white-space:nowrap;">${r.tanggal||"-"}</td>
              <td><span class="tag-chip" style="${r.tipe==="masuk"?"background:var(--primary-100);color:var(--primary-ink);":"background:var(--red-100);color:var(--red);"}">${r.tipe==="masuk"?"▲ Masuk":"▼ Keluar"}${r._transfer?" 🔄":""}</span></td>
              <td class="num" style="text-align:right;font-weight:700;color:${r.tipe==="masuk"?"var(--primary-ink)":"var(--red)"};">${fmtIDR(r.jumlah)}</td>
              <td class="num" style="text-align:right;color:var(--text-soft);">${fmtIDR(r._running)}</td>
              <td style="font-size:12px;">${r.keterangan||"<span class='empty-cell'>-</span>"}</td>
              <td><div class="row-actions" style="justify-content:flex-end;">
                <button class="act-icon del-mut-btn" style="color:var(--red);" title="Hapus">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
                </button>
              </div></td>
            </tr>`).join("")}
          </tbody>
        </table>
      </div>`;
    holder.querySelectorAll(".del-mut-btn").forEach(btn=>{
      btn.addEventListener("click",async()=>{
        if(!confirm("Hapus mutasi ini?")) return;
        const id=Number(btn.closest("tr").dataset.id);
        await dbDelete("bankMutations",id);
        mutations=mutations.filter(m=>m.id!==id);
        renderTabBody(); render();
      });
    });
  }

  function renderTransfer(holder){
    const history = mutations.filter(m=>m._transfer)
      .sort((a,b)=>(b.tanggal||"").localeCompare(a.tanggal||""));
    holder.innerHTML=`
      <div class="section" style="max-width:440px;margin-bottom:16px;">
        <div class="section-head"><h3>Transfer Antar Rekening</h3></div>
        <div style="padding:0 2px;display:flex;flex-direction:column;gap:10px;">
          <div class="field-row">
            <div class="field"><label>Dari Rekening *</label>
              <select id="tf-dari"><option value="">-- Pilih --</option>${accounts.map(a=>`<option value="${a.id}">${a.namaBank} (${fmtIDR(saldo(a.id))})</option>`).join("")}</select>
            </div>
            <div class="field"><label>Ke Rekening *</label>
              <select id="tf-ke"><option value="">-- Pilih --</option>${accounts.map(a=>`<option value="${a.id}">${a.namaBank}</option>`).join("")}</select>
            </div>
          </div>
          <div class="field-row">
            <div class="field"><label>Jumlah (Rp) *</label><input id="tf-jml" type="number" min="1" value="0"></div>
            <div class="field"><label>Tanggal *</label><input id="tf-tgl" type="date" value="${todayStr()}"></div>
          </div>
          <div class="field"><label>Keterangan</label><input id="tf-ket" type="text" placeholder="Opsional"></div>
          <button class="btn btn-primary" id="tf-save" style="align-self:flex-start;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            Proses Transfer
          </button>
        </div>
      </div>
      <div class="section">
        <div class="section-head"><h3>Riwayat Transfer</h3></div>
        ${history.length?`
        <div class="table-wrap">
          <table class="data-table">
            <thead><tr><th>Tanggal</th><th>Dari</th><th>Ke</th><th style="text-align:right">Jumlah</th><th>Keterangan</th></tr></thead>
            <tbody>${history.map(r=>`
              <tr><td>${r.tanggal}</td><td>${accName(r._transferDari||r.bankId)}</td><td>${accName(r._transferKe||0)}</td>
              <td class="num" style="text-align:right;font-weight:700;">${fmtIDR(r.jumlah)}</td>
              <td style="font-size:12px;">${r.keterangan||"-"}</td></tr>`).join("")}
            </tbody>
          </table>
        </div>`:
        `<div class="empty-state" style="padding:20px;">${iconSvg("bank")}<div class="et-title">Belum ada riwayat transfer</div></div>`}
      </div>
    `;
    holder.querySelector("#tf-save").addEventListener("click",async()=>{
      const dari=Number(holder.querySelector("#tf-dari").value);
      const ke  =Number(holder.querySelector("#tf-ke").value);
      const jml =Number(holder.querySelector("#tf-jml").value)||0;
      const tgl =holder.querySelector("#tf-tgl").value;
      const ket =holder.querySelector("#tf-ket").value.trim();
      if(!dari||!ke||!jml||!tgl){ toast("Isi semua field wajib."); return; }
      if(dari===ke){ toast("Rekening asal dan tujuan tidak boleh sama."); return; }
      if(jml>saldo(dari)){ toast(`Saldo ${accName(dari)} tidak cukup.`); return; }
      const ket2=ket||`Transfer ${accName(dari)} → ${accName(ke)}`;
      const outId=await dbAdd("bankMutations",{bankId:dari,tanggal:tgl,tipe:"keluar",jumlah:jml,keterangan:ket2,_transfer:true,_transferDari:dari,_transferKe:ke});
      await dbAdd("bankMutations",{bankId:ke,tanggal:tgl,tipe:"masuk",jumlah:jml,keterangan:ket2,_transfer:true,_transferDari:dari,_transferKe:ke});
      mutations=await dbGetAll("bankMutations");
      render();
      toast(`Transfer ${fmtIDR(jml)} dari ${accName(dari)} ke ${accName(ke)} berhasil.`);
    });
  }

  function openAddAcc(){
    const modal=openModal("Tambah Rekening Bank",`
      <div class="field"><label>Nama Bank *</label><input id="af-bank" type="text" placeholder="BCA, Mandiri, BRI, GoPay..."></div>
      <div class="field-row">
        <div class="field"><label>Nomor Rekening</label><input id="af-norek" type="text"></div>
        <div class="field"><label>Nama Pemilik</label><input id="af-pemilik" type="text"></div>
      </div>
      <div class="field"><label>Saldo Awal (Rp)</label><input id="af-saldo" type="number" value="0" min="0"></div>
    `,`<button class="btn" id="modal-cancel">Batal</button><button class="btn btn-primary" id="modal-save">Simpan</button>`);
    modal.querySelector("#modal-cancel").addEventListener("click",closeModal);
    modal.querySelector("#modal-save").addEventListener("click",async()=>{
      const namaBank=modal.querySelector("#af-bank").value.trim();
      if(!namaBank){toast("Nama bank wajib.");return;}
      const rec={namaBank,nomorRek:modal.querySelector("#af-norek").value.trim(),namaPemilik:modal.querySelector("#af-pemilik").value.trim()};
      const id=await dbAdd("bankAccounts",rec); rec.id=id; accounts.push(rec); selAccId=id;
      const saldoAwal=Number(modal.querySelector("#af-saldo").value)||0;
      if(saldoAwal>0){
        const m={bankId:id,tanggal:todayStr(),tipe:"masuk",jumlah:saldoAwal,keterangan:"Saldo awal"};
        const mid=await dbAdd("bankMutations",m); m.id=mid; mutations.push(m);
      }
      closeModal(); render(); toast("Rekening ditambahkan.");
    });
  }

  function openAddMut(){
    if(!selAccId){toast("Pilih rekening dulu.");return;}
    const modal=openModal(`Tambah Mutasi — ${accName(selAccId)}`,`
      <div class="field-row">
        <div class="field"><label>Tanggal *</label><input id="mf-tgl" type="date" value="${todayStr()}"></div>
        <div class="field"><label>Tipe *</label>
          <select id="mf-tipe"><option value="masuk">▲ Masuk</option><option value="keluar">▼ Keluar</option></select>
        </div>
      </div>
      <div class="field"><label>Jumlah (Rp) *</label><input id="mf-jml" type="number" min="1" value="0"></div>
      <div class="field"><label>Keterangan</label><input id="mf-ket" type="text" placeholder="Misal: Pembayaran invoice #001"></div>
    `,`<button class="btn" id="modal-cancel">Batal</button><button class="btn btn-primary" id="modal-save">Simpan</button>`);
    modal.querySelector("#modal-cancel").addEventListener("click",closeModal);
    modal.querySelector("#modal-save").addEventListener("click",async()=>{
      const tgl=modal.querySelector("#mf-tgl").value;
      const jml=Number(modal.querySelector("#mf-jml").value)||0;
      if(!tgl||!jml){toast("Tanggal & jumlah wajib.");return;}
      const rec={bankId:selAccId,tanggal:tgl,tipe:modal.querySelector("#mf-tipe").value,jumlah:jml,keterangan:modal.querySelector("#mf-ket").value.trim()};
      const id=await dbAdd("bankMutations",rec); rec.id=id; mutations.push(rec);
      closeModal(); renderTabBody(); render();
      toast("Mutasi ditambahkan.");
    });
  }

  function exportXLS(){
    exportMultiSheetXLS([
      {name:"Rekening",headers:[{key:"id",label:"ID"},{key:"namaBank",label:"Nama Bank"},{key:"nomorRek",label:"No. Rekening"},{key:"namaPemilik",label:"Nama Pemilik"}],
       rows:accounts.map(a=>({...a,_saldo:saldo(a.id)})).map(a=>({id:a.id,namaBank:a.namaBank,nomorRek:a.nomorRek,namaPemilik:a.namaPemilik}))},
      {name:"Mutasi",headers:[{key:"id",label:"ID"},{key:"namaBank",label:"Rekening"},{key:"tanggal",label:"Tanggal"},{key:"tipe",label:"Tipe"},{key:"jumlah",label:"Jumlah"},{key:"keterangan",label:"Keterangan"}],
       rows:mutations.map(m=>({...m,namaBank:accName(m.bankId)}))}
    ],`bank_${todayStr()}`);
    toast("Export XLS bank berhasil.");
  }

  render();
}

/* ================================================================
   PIUTANG & HUTANG
   ================================================================ */
function makeDebtPage(type){
  /* type = "receivables" | "payables" */
  const isRec = type==="receivables";
  const storeName = type;
  const title = isRec ? "Piutang" : "Hutang";
  const pihakLabel = isRec ? "Pelanggan" : "Supplier";
  const csvPrefix = isRec ? "piutang" : "hutang";
  const CSV_HEADERS = [
    {key:"id",label:"ID"},{key:"nomorNota",label:"Nomor Nota"},{key:"tanggal",label:"Tanggal"},
    {key:"pihakNama",label:pihakLabel},{key:"total",label:"Total"},{key:"sisa",label:"Sisa"},
    {key:"status",label:"Status"},{key:"catatan",label:"Catatan"}
  ];

  return async function(root){
    let allRows = await dbGetAll(storeName);
    let query="", filterStatus="", filterTempo="";

    function isOverdue(r){
      return r.jatuhTempo && r.jatuhTempo < todayStr() && r.status!=="lunas";
    }
    function filtered(){
      return allRows.filter(r=>{
        const q=!query||[r.pihakNama,r.nomorNota,r.catatan].some(v=>String(v||"").toLowerCase().includes(query));
        const s=!filterStatus||r.status===filterStatus;
        let t=true;
        if(filterTempo==="baru")  t=!!r.jatuhTempo&&r.jatuhTempo>=todayStr()&&r.status!=="lunas";
        if(filterTempo==="lama")  t=isOverdue(r);
        if(filterTempo==="none")  t=!r.jatuhTempo;
        return q&&s&&t;
      });
    }

    root.innerHTML=`
      <div class="crud-toolbar">
        <div class="search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"></circle><path d="M21 21l-4.3-4.3"/></svg>
          <input type="text" id="debt-search" placeholder="Cari ${pihakLabel.toLowerCase()} / nota...">
        </div>
        <div class="crud-toolbar-row2">
          <div class="select-filter-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9 12l2 2 4-4"/></svg>
            <select id="debt-filter-status">
              <option value="">Semua Status</option>
              <option value="belum">Belum Bayar</option>
              <option value="sebagian">Sebagian</option>
              <option value="lunas">Lunas</option>
            </select>
          </div>
          <div class="select-filter-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
            <select id="debt-filter-tempo">
              <option value="">Semua Tempo</option>
              <option value="baru">Baru (belum jatuh tempo)</option>
              <option value="lama">Lama (sudah jatuh tempo)</option>
              <option value="none">Tanpa jatuh tempo</option>
            </select>
          </div>
          <span class="count-pill" id="debt-count"></span>
          <button class="btn" id="debt-export">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;"><path d="M12 3v12"/><path d="M7 10l5 5 5-5"/><path d="M4 19h16"/></svg>Export XLS
          </button>
          <button class="btn btn-primary" id="debt-add">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" style="width:14px;height:14px;"><path d="M12 5v14M5 12h14"/></svg>Tambah Manual
          </button>
        </div>
      </div>
      <div class="stat-grid" id="debt-stats" style="margin-bottom:14px;"></div>
      <div class="table-wrap"><div id="debt-table-holder"></div></div>
    `;

    function filtered(){
      return allRows.filter(r=>{
        const q=!query||[r.pihakNama,r.nomorNota,r.catatan].some(v=>String(v||"").toLowerCase().includes(query));
        const s=!filterStatus||r.status===filterStatus;
        return q&&s;
      });
    }

    function renderStats(){
      const rows=filtered();
      const totalAktif=rows.filter(r=>r.status!=="lunas").reduce((a,b)=>a+Number(b.sisa||0),0);
      const totalLunas=rows.filter(r=>r.status==="lunas").reduce((a,b)=>a+Number(b.total||0),0);
      const overdue=rows.filter(r=>isOverdue(r)).length;
      root.querySelector("#debt-stats").innerHTML=`
        <div class="stat-card acc-amber"><div class="stat-label">${title} Aktif</div><div class="stat-value num">${fmtIDRHtml(totalAktif)}</div></div>
        <div class="stat-card acc-red"><div class="stat-label">Jatuh Tempo (lama)</div><div class="stat-value num">${overdue} tagihan</div></div>
        <div class="stat-card"><div class="stat-label">${title} Lunas</div><div class="stat-value num">${fmtIDRHtml(totalLunas)}</div></div>
      `;
    }

    function tempoBadge(r){
      if(!r.jatuhTempo) return `<span class="tag-chip" style="background:var(--surface-2);color:var(--text-soft);">–</span>`;
      if(r.status==="lunas") return `<span style="font-size:11.5px;">${r.jatuhTempo}</span>`;
      if(isOverdue(r)) return `<span class="tag-chip" style="background:var(--red-100);color:var(--red);">⚠ Lama</span><br><span style="font-size:10.5px;color:var(--red);">${r.jatuhTempo}</span>`;
      return `<span class="tag-chip" style="background:var(--primary-100);color:var(--primary-ink);">Baru</span><br><span style="font-size:10.5px;">${r.jatuhTempo}</span>`;
    }

    function renderTable(){
      renderStats();
      const rows=filtered().sort((a,b)=>{
        // overdue first, then by date
        const ao=isOverdue(a)?0:1, bo=isOverdue(b)?0:1;
        if(ao!==bo) return ao-bo;
        return (b.tanggal||"").localeCompare(a.tanggal||"");
      });
      root.querySelector("#debt-count").textContent=`${rows.length} dari ${allRows.length}`;
      const holder=root.querySelector("#debt-table-holder");
      if(!rows.length){
        holder.innerHTML=`<div class="empty-state">${iconSvg(isRec?"receivables":"payables")}<div class="et-title">Belum ada ${title.toLowerCase()}</div><div class="et-sub">${title} kredit dari transaksi akan muncul otomatis di sini.</div></div>`;
        return;
      }
      holder.innerHTML=`
        <table class="data-table">
          <thead><tr><th>Nota</th><th>Tanggal</th><th>${pihakLabel}</th><th style="text-align:right">Total</th><th style="text-align:right">Sisa</th><th>Status</th><th>Jatuh Tempo</th><th style="text-align:right">Aksi</th></tr></thead>
          <tbody>${rows.map(r=>`
            <tr data-id="${r.id}" style="${isOverdue(r)?"background:var(--red-100)!important;":""}">
              <td>${r.nomorNota||"-"}</td>
              <td style="font-size:11.5px;">${r.tanggal||"-"}</td>
              <td><strong>${r.pihakNama||"-"}</strong></td>
              <td class="num" style="text-align:right;">${fmtIDR(r.total)}</td>
              <td class="num" style="text-align:right;font-weight:700;">${fmtIDR(r.sisa)}</td>
              <td>${statusBadge(r.status)}</td>
              <td>${tempoBadge(r)}</td>
              <td><div class="row-actions" style="justify-content:flex-end;">
                ${r.status!=="lunas"?`<button class="act-icon pay-btn" title="Bayar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></button>`:""}
                <button class="act-icon del-btn" style="color:var(--red);" title="Hapus"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg></button>
              </div></td>
            </tr>`).join("")}
          </tbody>
        </table>`;
      holder.querySelectorAll(".pay-btn").forEach(btn=>{
        btn.addEventListener("click",()=>{
          const r=allRows.find(x=>x.id===Number(btn.closest("tr").dataset.id));
          openPayModal(r);
        });
      });
      holder.querySelectorAll(".del-btn").forEach(btn=>{
        btn.addEventListener("click",async()=>{
          if(!confirm(`Hapus ${title.toLowerCase()} ini?`)) return;
          const id=Number(btn.closest("tr").dataset.id);
          await dbDelete(storeName,id);
          allRows=allRows.filter(r=>r.id!==id);
          renderTable();
          toast("Data dihapus.");
        });
      });
    }

    function openPayModal(r){
      const modal=openModal(`Bayar ${title} — ${r.nomorNota||""}`,`
        <div style="font-size:13px;margin-bottom:10px;">
          <b>${pihakLabel}:</b> ${r.pihakNama||"-"}<br>
          <b>Sisa:</b> <span class="num">${fmtIDR(r.sisa)}</span>
        </div>
        <div class="field"><label>Jumlah Bayar (Rp) *</label><input id="pf-jml" type="number" min="1" max="${r.sisa}" value="${r.sisa}"></div>
        <div class="field"><label>Tanggal Bayar *</label><input id="pf-tgl" type="date" value="${todayStr()}"></div>
        <div class="field"><label>Metode</label><select id="pf-met"><option>Cash</option><option>Transfer</option></select></div>
        <div class="field"><label>Catatan</label><input id="pf-ket" type="text"></div>
      `,`<button class="btn" id="modal-cancel">Batal</button><button class="btn btn-primary" id="modal-save">Simpan</button>`);
      modal.querySelector("#modal-cancel").addEventListener("click",closeModal);
      modal.querySelector("#modal-save").addEventListener("click",async()=>{
        const jml=Number(modal.querySelector("#pf-jml").value)||0;
        const tgl=modal.querySelector("#pf-tgl").value;
        const met=modal.querySelector("#pf-met").value;
        if(!jml||!tgl){toast("Isi jumlah & tanggal.");return;}
        if(jml>r.sisa){toast("Melebihi sisa.");return;}
        r.riwayat=r.riwayat||[];
        r.riwayat.push({tanggal:tgl,jumlah:jml,metode:met,catatan:modal.querySelector("#pf-ket").value.trim()});
        r.sisa=r.sisa-jml;
        r.status=r.sisa<=0?"lunas":(r.sisa<r.total?"sebagian":"belum");
        await dbPut(storeName,r);
        allRows=allRows.map(x=>x.id===r.id?r:x);
        /* Catat ke kas */
        if(met==="Cash"){
          await dbAdd("cashEntries",{
            tanggal:tgl, tipe: isRec?"masuk":"keluar",
            kategori: isRec?"Pembayaran Piutang":"Bayar Hutang",
            jumlah:jml, keterangan:r.nomorNota
          });
        }
        closeModal(); renderTable();
        toast(r.status==="lunas"?`${title} ${r.nomorNota} lunas!`:`Bayar ${fmtIDR(jml)}, sisa ${fmtIDR(r.sisa)}.`);
      });
    }

    function openAddManual(){
      const modal=openModal(`Tambah ${title} Manual`,`
        <div class="field-row">
          <div class="field"><label>Nomor Nota</label><input id="dm-nota" type="text" placeholder="Auto"></div>
          <div class="field"><label>Tanggal *</label><input id="dm-tgl" type="date" value="${todayStr()}"></div>
        </div>
        <div class="field"><label>${pihakLabel} *</label><input id="dm-pihak" type="text"></div>
        <div class="field"><label>Total (Rp) *</label><input id="dm-total" type="number" min="0" value="0"></div>
        <div class="field">
          <label>Jatuh Tempo</label>
          <input id="dm-jt" type="date">
          <div class="field-hint">Isi untuk menentukan apakah piutang/hutang "Baru" atau "Lama".</div>
        </div>
        <div class="field"><label>Catatan</label><textarea id="dm-cat" rows="2"></textarea></div>
      `,`<button class="btn" id="modal-cancel">Batal</button><button class="btn btn-primary" id="modal-save">Simpan</button>`);
      modal.querySelector("#modal-cancel").addEventListener("click",closeModal);
      modal.querySelector("#modal-save").addEventListener("click",async()=>{
        const tgl=modal.querySelector("#dm-tgl").value;
        const pihak=modal.querySelector("#dm-pihak").value.trim();
        const total=Number(modal.querySelector("#dm-total").value)||0;
        if(!tgl||!pihak||!total){toast("Isi semua field wajib.");return;}
        const nota=modal.querySelector("#dm-nota").value.trim()||`${isRec?"PIU":"HUT"}-${Date.now().toString().slice(-6)}`;
        const rec={nomorNota:nota,tanggal:tgl,pihakNama:pihak,total,sisa:total,
          jatuhTempo:modal.querySelector("#dm-jt").value||"",
          status:"belum",catatan:modal.querySelector("#dm-cat").value.trim(),riwayat:[]};
        const id=await dbAdd(storeName,rec);
        rec.id=id; allRows.push(rec);
        closeModal(); renderTable(); toast(`${title} ditambahkan.`);
      });
    }

    function statusBadge(s){
      const map={belum:["var(--red-100)","var(--red)","Belum Bayar"],sebagian:["var(--amber-100)","var(--amber)","Sebagian"],lunas:["var(--primary-100)","var(--primary-ink)","Lunas"]};
      const [bg,clr,lbl]=map[s]||["var(--surface-2)","var(--text-soft)",s];
      return `<span class="tag-chip" style="background:${bg};color:${clr};">${lbl}</span>`;
    }

    root.querySelector("#debt-search").addEventListener("input",e=>{query=e.target.value.trim().toLowerCase();renderTable();});
    root.querySelector("#debt-filter-status").addEventListener("change",e=>{filterStatus=e.target.value;renderTable();});
    root.querySelector("#debt-filter-tempo").addEventListener("change",e=>{filterTempo=e.target.value;renderTable();});
    root.querySelector("#debt-add").addEventListener("click",openAddManual);
    root.querySelector("#debt-export").addEventListener("click",()=>{
      const rows=filtered();
      if(!rows.length){toast("Tidak ada data.");return;}
      downloadXLSX(`${csvPrefix}_${todayStr()}.xlsx`, [{name:title, headers:CSV_HEADERS, rows}]);
      toast(`Export ${rows.length} baris.`);
    });
    renderTable();
  };
}

/* ================================================================
   NOTA / INVOICE GENERATOR
   ================================================================ */
async function renderInvoicePage(root){
  const settings = await dbGetAll("settings");
  const cfg = {};
  settings.forEach(s => cfg[s.key] = s.value);
  let mode = "single"; // "single" | "statement"

  async function draw(){
    root.innerHTML = `
      <div class="tab-bar no-print" style="margin-bottom:14px;">
        <button class="tab-item${mode==="single"?" active":""}" data-mode="single">Nota Tunggal</button>
        <button class="tab-item${mode==="statement"?" active":""}" data-mode="statement">Invoice Statement</button>
      </div>
      <div id="nota-mode-body"></div>
    `;
    root.querySelectorAll(".tab-item").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        if(mode===btn.dataset.mode) return;
        mode = btn.dataset.mode;
        draw();
      });
    });
    const body = root.querySelector("#nota-mode-body");
    if(mode==="single") await renderSingleNotaMode(body, cfg);
    else await renderStatementMode(body, cfg);
  }
  await draw();
}

/* ---------- Nota Tunggal (per transaksi) ---------- */
async function renderSingleNotaMode(root, cfg){
  const [sales, purchases] = await Promise.all([dbGetAll("sales"), dbGetAll("purchases")]);

  const allTx = [
    ...sales.map(s=>({...s,_type:"Penjualan"})),
    ...purchases.map(p=>({...p,_type:"Pembelian"}))
  ].sort((a,b)=>(b.tanggal||"").localeCompare(a.tanggal||""));

  let selId = allTx[0]?.id || null;
  let selType = allTx[0]?._type || "Penjualan";

  root.innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 340px;gap:18px;align-items:start;" id="nota-layout">
      <div>
        <div class="crud-toolbar" style="margin-bottom:14px;">
          <div class="search-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"></circle><path d="M21 21l-4.3-4.3"/></svg>
            <input type="text" id="nota-search" placeholder="Cari nomor nota...">
          </div>
        </div>
        <div class="table-wrap"><div id="nota-tx-list"></div></div>
      </div>
      <div>
        <div style="display:flex;gap:8px;margin-bottom:8px;" class="no-print">
          <button class="btn btn-primary" style="flex:1;" id="nota-print-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8" rx="1"/></svg>
            Cetak Nota
          </button>
          <button class="btn" id="nota-format-toggle" title="Ganti ukuran nota (Termal 58mm / 80mm / Invoice A4)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
          </button>
        </div>
        <div class="no-print" id="nota-size-badge" style="font-size:11px;color:var(--text-soft);margin-bottom:12px;text-align:right;"></div>
        <div id="nota-preview-wrap"></div>

  `;

  /* Responsive: stack on mobile */
  if(window.innerWidth < 760){
    root.querySelector("#nota-layout").style.gridTemplateColumns = "1fr";
  }

  let query = "";
  function filteredTx(){
    return !query ? allTx : allTx.filter(t=>(t.nomorNota||"").toLowerCase().includes(query)||(t.pihakNama||"").toLowerCase().includes(query));
  }

  function renderList(){
    const rows = filteredTx();
    const holder = root.querySelector("#nota-tx-list");
    if(!rows.length){
      holder.innerHTML=`<div class="empty-state">${iconSvg("invoice")}<div class="et-title">Belum ada transaksi</div></div>`;
      return;
    }
    holder.innerHTML=`
      <table class="data-table">
        <thead><tr><th>Nota</th><th>Tanggal</th><th>Jenis</th><th style="text-align:right">Total</th></tr></thead>
        <tbody>${rows.map(r=>`
          <tr data-id="${r.id}" data-type="${r._type}" style="cursor:pointer;${r.id===selId&&r._type===selType?"background:var(--primary-100);":""}">
            <td><strong>${r.nomorNota||"-"}</strong>${r.status==="dibatalkan"?' <span class="stok-badge stok-empty">Batal</span>':""}</td>
            <td style="font-size:11.5px;">${r.tanggal||"-"}</td>
            <td><span class="tag-chip" style="${r._type==="Pembelian"?"background:var(--blue-100);color:var(--blue);":""}">${r._type}</span></td>
            <td class="num" style="text-align:right;font-weight:700;">${fmtIDR(r.total)}</td>
          </tr>`).join("")}
        </tbody>
      </table>`;
    holder.querySelectorAll("tr[data-id]").forEach(tr=>{
      tr.addEventListener("click",()=>{
        selId=Number(tr.dataset.id); selType=tr.dataset.type;
        renderList(); renderPreview();

  function sizeLabel(sz){
    return sz==="thermal58"?"Termal 58mm":sz==="invoiceA4"?"Invoice A4":"Termal 80mm";

  function renderPreview(){
    const tx = allTx.find(t=>t.id===selId&&t._type===selType);
    const wrap = root.querySelector("#nota-preview-wrap");
    const sizeBadge = root.querySelector("#nota-size-badge");
    const notaSize = cfg.notaSize || "thermal80";
    if(sizeBadge) sizeBadge.textContent = "Ukuran: " + sizeLabel(notaSize);
    if(!tx){
      wrap.innerHTML=`<div class="empty-state" style="border:1px dashed var(--border);border-radius:var(--radius-md);padding:40px 20px;">${iconSvg("invoice")}<div class="et-title">Pilih transaksi</div></div>`;
      return;
    }
    const items = tx.items||[];
    const tokoNama = cfg.tokoNama||"Nama Toko";
    const tokoAlamat = cfg.tokoAlamat||"";
    const tokoTelp = cfg.tokoTelp||"";
    wrap.innerHTML=`
      <div class="nota-preview size-${notaSize}" id="nota-content">
        <div class="np-title">${tokoNama}</div>
        ${tokoAlamat?`<div class="np-sub">${tokoAlamat}${tokoTelp?" · "+tokoTelp:""}</div>`:""}
        ${tx.status==="dibatalkan"?`<div class="np-batal-banner">NOTA DIBATALKAN</div>`:""}
        <hr>
        <table>
          <tr><td>Nota</td><td style="text-align:right">${tx.nomorNota||"-"}</td></tr>
          ${tx.nomorPO?`<tr><td>No. P/O</td><td style="text-align:right">${tx.nomorPO}</td></tr>`:""}
          <tr><td>Tanggal</td><td style="text-align:right">${tx.tanggal||"-"}</td></tr>
          <tr><td>${tx._type==="Penjualan"?"Pelanggan":"Supplier"}</td><td style="text-align:right">${tx.pihakNama||"-"}</td></tr>
        </table>
        <hr>
        <table class="np-body-table">
          <thead><tr><td><b>Produk</b></td><td style="text-align:right"><b>Qty</b></td><td style="text-align:right"><b>Harga</b></td><td style="text-align:right"><b>Subtotal</b></td></tr></thead>
          <tbody>
            ${items.map(it=>`<tr>
              <td>${it.nama||"-"}</td>
              <td style="text-align:right">${it.qty}</td>
              <td style="text-align:right">${fmtIDR(it.harga)}</td>
              <td style="text-align:right">${fmtIDR(it.subtotal)}</td>
            </tr>`).join("")}
          </tbody>
        </table>
        <hr>
        <table>
          ${tx.diskon?`<tr><td>Diskon</td><td style="text-align:right">- ${fmtIDR(tx.diskon)}</td></tr>`:""}
          ${tx.pajak?`<tr><td>Pajak</td><td style="text-align:right">+ ${fmtIDR(tx.pajak)}</td></tr>`:""}
          <tr><td class="np-total">TOTAL</td><td class="np-total">${fmtIDR(tx.total)}</td></tr>
          <tr><td style="font-size:.85em;">Pembayaran</td><td style="text-align:right;font-size:.85em;">${tx.metode||"-"}</td></tr>

  }

  root.querySelector("#nota-format-toggle").addEventListener("click", async ()=>{
    const order = ["thermal58","thermal80","invoiceA4"];
    const cur = cfg.notaSize || "thermal80";
    const next = order[(order.indexOf(cur)+1) % order.length];
    cfg.notaSize = next;
    await dbPut("settings", {key:"notaSize", value:next});
    renderPreview();
    toast(`Ukuran nota diganti: ${sizeLabel(next)}`);
  });

  root.querySelector("#nota-search").addEventListener("input",e=>{query=e.target.value.trim().toLowerCase();renderList();});
  renderList();
  renderPreview();
}

/* ---------- Invoice Statement (gabungan beberapa nota kredit belum lunas jadi 1 tagihan) ----------
   - Nota asli & piutang TIDAK pernah diubah/dihapus — statement hanya menyimpan referensi + snapshot.
   - Statement bisa diedit (tambah/kurangi nota) selama 3 hari sejak dibuat, sama seperti aturan nota.
   - Setelah lewat 3 hari, hanya "Batalkan" yang tersedia (melepas nota kembali ke daftar belum ditagih). */
async function renderStatementMode(root, cfg){
  const [customers, receivablesRaw, statementsRaw] = await Promise.all([
    dbGetAll("customers"), dbGetAll("receivables"), dbGetAll("invoiceStatements")
  ]);
  let receivables = receivablesRaw;
  let statements = statementsRaw;
  let selPelangganId = null;
  let editingStatement = null; // null = mode buat baru; object = mode edit
  let previewStatement = statements.length
    ? statements.slice().sort((a,b)=>(b.dibuatPada||"").localeCompare(a.dibuatPada||""))[0]
    : null;

  const EDIT_WINDOW_MS = 3 * 24 * 60 * 60 * 1000;
  function isEditableStmt(s){
    if(!s || s.status==="dibatalkan") return false;
    if(!s.dibuatPada) return false;
    return (Date.now() - new Date(s.dibuatPada).getTime()) <= EDIT_WINDOW_MS;
  }

  root.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 340px;gap:18px;align-items:start;" id="stmt-layout">
      <div>
        <div class="crud-toolbar no-print" style="margin-bottom:14px;">
          <div class="field" style="flex:1;min-width:220px;margin:0;">
            <label style="font-size:11px;">Pilih Pelanggan (piutang belum lunas)</label>
            <select id="stmt-pelanggan">
              <option value="">-- Pilih Pelanggan --</option>
              ${customers.map(c=>`<option value="${c.id}">${c.nama}</option>`).join("")}
            </select>
          </div>
        </div>
        <div id="stmt-nota-list"></div>
        <div style="margin-top:22px;">
          <h4 style="font-size:13px;margin-bottom:10px;">Riwayat Invoice Statement</h4>
          <div id="stmt-history-list"></div>
        </div>
      </div>
      <div>
        <div style="display:flex;gap:8px;margin-bottom:8px;" class="no-print">
          <button class="btn btn-primary" style="flex:1;" id="stmt-print-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8" rx="1"/></svg>
            Cetak Statement
          </button>
        </div>
        <div class="no-print" style="font-size:11px;color:var(--text-soft);margin-bottom:12px;text-align:right;">Format cetak: Invoice A4</div>
        <div id="stmt-preview-wrap"></div>
      </div>
    </div>
  `;
  if(window.innerWidth < 760){
    root.querySelector("#stmt-layout").style.gridTemplateColumns = "1fr";
  }

  /* Nota yg boleh dipilih: belum lunas, dan (belum masuk statement manapun ATAU sedang masuk statement yg lagi diedit) */
  function selectableFor(pelangganId, editId){
    return receivables.filter(r=>r.pelangganId===pelangganId && r.status!=="lunas" && (!r.statementId || r.statementId===editId));
  }

  function exitEditMode(){
    editingStatement = null;
    renderChecklist();
  }

  function renderChecklist(){
    const holder = root.querySelector("#stmt-nota-list");
    const pelangganSel = root.querySelector("#stmt-pelanggan");

    if(editingStatement){
      pelangganSel.value = String(editingStatement.pelangganId);
      pelangganSel.disabled = true;
    } else {
      pelangganSel.disabled = false;
    }

    if(!selPelangganId){
      holder.innerHTML = `<div class="empty-state">${iconSvg("receivables")}<div class="et-title">Pilih pelanggan dulu</div><div class="et-sub">Daftar nota kredit yang belum lunas akan muncul di sini.</div></div>`;
      return;
    }
    const editId = editingStatement ? editingStatement.id : null;
    const selectable = selectableFor(selPelangganId, editId);
    const preCheckedIds = editingStatement ? editingStatement.items.map(it=>it.receivableId) : [];

    if(!selectable.length){
      holder.innerHTML = `<div class="empty-state">${iconSvg("receivables")}<div class="et-title">Tidak ada piutang belum lunas</div><div class="et-sub">Semua nota kredit pelanggan ini sudah lunas / sudah masuk statement lain.</div></div>`;
      return;
    }
    holder.innerHTML = `
      ${editingStatement?`<div style="background:var(--primary-100);color:var(--primary-ink);border-radius:7px;padding:8px 12px;font-size:12px;font-weight:700;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;">
        <span>Mode Edit — ${editingStatement.nomorStatement}</span>
        <button class="btn btn-sm" id="stmt-cancel-edit-btn" style="background:#fff;">Batal Edit</button>
      </div>`:""}
      <div class="table-wrap">
        <table class="data-table">
          <thead><tr>
            <th style="width:34px;"><input type="checkbox" id="stmt-check-all"></th>
            <th>No. Nota</th><th>Tanggal</th>
            <th style="text-align:right">Total Nota</th><th style="text-align:right">Sisa Tagihan</th>
          </tr></thead>
          <tbody>${selectable.map(r=>`
            <tr>
              <td><input type="checkbox" class="stmt-check" data-id="${r.id}" ${preCheckedIds.includes(r.id)?"checked":""}></td>
              <td><strong>${r.nomorNota||"-"}</strong></td>
              <td style="font-size:11.5px;">${r.tanggal||"-"}</td>
              <td class="num" style="text-align:right;">${fmtIDR(r.total)}</td>
              <td class="num" style="text-align:right;font-weight:700;">${fmtIDR(r.sisa)}</td>
            </tr>`).join("")}
          </tbody>
        </table>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px;flex-wrap:wrap;gap:10px;">
        <div style="font-size:13px;font-weight:700;">Dipilih: <span id="stmt-sel-count">0</span> nota &middot; Total: <span id="stmt-sel-total" class="num">${fmtIDRHtml(0)}</span></div>
        <button class="btn btn-primary" id="stmt-create-btn" disabled>${editingStatement?"Simpan Perubahan":"+ Buat Invoice Statement"}</button>
      </div>
    `;
    if(editingStatement){
      holder.querySelector("#stmt-cancel-edit-btn").addEventListener("click", exitEditMode);
    }
    const allCk = holder.querySelector("#stmt-check-all");
    const checks = ()=>Array.from(holder.querySelectorAll(".stmt-check"));
    function syncAllCkState(){
      allCk.checked = checks().length>0 && checks().every(c=>c.checked);
    }
    function updateSel(){
      const checked = checks().filter(c=>c.checked);
      const total = checked.reduce((a,c)=>a+Number(selectable.find(r=>r.id===Number(c.dataset.id))?.sisa||0),0);
      holder.querySelector("#stmt-sel-count").textContent = checked.length;
      holder.querySelector("#stmt-sel-total").innerHTML = fmtIDRHtml(total);
      holder.querySelector("#stmt-create-btn").disabled = checked.length===0;
      syncAllCkState();
    }
    allCk.addEventListener("change", ()=>{
      checks().forEach(c=>c.checked = allCk.checked);
      updateSel();
    });
    checks().forEach(c=>c.addEventListener("change", updateSel));

    holder.querySelector("#stmt-create-btn").addEventListener("click", async ()=>{
      const checkedIds = checks().filter(c=>c.checked).map(c=>Number(c.dataset.id));
      if(!checkedIds.length) return;
      const included = selectable.filter(r=>checkedIds.includes(r.id));

      if(editingStatement){
        const previousIds = editingStatement.items.map(it=>it.receivableId);
        for(const oldId of previousIds){
          if(!checkedIds.includes(oldId)){
            const r = receivables.find(x=>x.id===oldId);
            if(r && r.statementId===editingStatement.id){ delete r.statementId; await dbPut("receivables", r); }
          }
        }
        for(const r of included){
          if(r.statementId !== editingStatement.id){
            r.statementId = editingStatement.id;
            await dbPut("receivables", r);
          }
        }
        editingStatement.items = included.map(r=>({
          receivableId:r.id, nomorNota:r.nomorNota, tanggalNota:r.tanggal,
          total:Number(r.total||0), sisa:Number(r.sisa||0)
        }));
        editingStatement.grandTotal = included.reduce((a,r)=>a+Number(r.sisa||0),0);
        editingStatement.dieditPada = new Date().toISOString();
        await dbPut("invoiceStatements", editingStatement);
        previewStatement = editingStatement;
        toast(`Statement ${editingStatement.nomorStatement} diperbarui — ${fmtIDR(editingStatement.grandTotal)}.`);
        editingStatement = null;
      } else {
        const pelanggan = customers.find(c=>c.id===selPelangganId);
        const nomorStatement = await nextNotaNumber("statement");
        const grandTotal = included.reduce((a,r)=>a+Number(r.sisa||0),0);
        const stmtRec = {
          nomorStatement,
          pelangganId: selPelangganId,
          pelangganNama: pelanggan?.nama || "-",
          tanggal: todayStr(),
          items: included.map(r=>({
            receivableId:r.id, nomorNota:r.nomorNota, tanggalNota:r.tanggal,
            total:Number(r.total||0), sisa:Number(r.sisa||0)
          })),
          grandTotal, status:"aktif",
          dibuatPada: new Date().toISOString()
        };
        const newId = await dbAdd("invoiceStatements", stmtRec);
        stmtRec.id = newId;
        statements.push(stmtRec);
        for(const r of included){
          r.statementId = newId;
          await dbPut("receivables", r);
        }
        previewStatement = stmtRec;
        toast(`Invoice Statement ${nomorStatement} dibuat — ${fmtIDR(grandTotal)}.`);
      }
      renderChecklist();
      renderHistory();
      renderPreview();
    });
    updateSel();
  }

  async function cancelStatement(s){
    if(s.status==="dibatalkan"){ toast("Statement ini sudah dibatalkan."); return; }
    if(!confirm(`Batalkan Invoice Statement ${s.nomorStatement}?\n\nNota-nota di dalamnya akan dilepas kembali (bisa dipilih ulang di statement baru).`)) return;
    for(const it of s.items){
      const r = receivables.find(x=>x.id===it.receivableId);
      if(r && r.statementId===s.id){
        delete r.statementId;
        await dbPut("receivables", r);
      }
    }
    s.status = "dibatalkan";
    await dbPut("invoiceStatements", s);
    if(editingStatement && editingStatement.id===s.id) editingStatement = null;
    toast(`Statement ${s.nomorStatement} dibatalkan.`);
    renderChecklist();
    renderHistory();
    renderPreview();
  }

  function startEdit(s){
    if(!isEditableStmt(s)){ toast("Statement ini sudah terkunci (lewat 3 hari) dan tidak bisa diedit lagi."); return; }
    editingStatement = s;
    selPelangganId = s.pelangganId;
    renderChecklist();
    previewStatement = s;
    renderPreview();
  }

  function renderHistory(){
    const holder = root.querySelector("#stmt-history-list");
    const rows = statements.slice().sort((a,b)=>(b.dibuatPada||"").localeCompare(a.dibuatPada||""));
    if(!rows.length){
      holder.innerHTML = `<div class="empty-state">${iconSvg("invoice")}<div class="et-title">Belum ada Invoice Statement</div></div>`;
      return;
    }
    holder.innerHTML = rows.map(s=>`
      <div class="prod-card" style="margin-bottom:8px;${s.status==='dibatalkan'?'opacity:.55;':''}">
        <div class="pc-top">
          <div class="pc-name">${s.nomorStatement}<span class="pc-kode">${s.pelangganNama} &middot; ${s.tanggal} &middot; ${s.items.length} nota${s.dieditPada?" &middot; diedit":""}</span></div>
          <span class="stok-badge ${s.status==='dibatalkan'?'stok-empty':'stok-ok'}">${s.status==='dibatalkan'?'Dibatalkan':'Aktif'}</span>
        </div>
        <div class="pc-foot" style="margin-top:8px;">
          <b class="num" style="font-size:13px;color:var(--text);">${fmtIDR(s.grandTotal)}</b>
          <div class="row-actions">
            <button class="act-icon stmt-view-btn" data-id="${s.id}" title="Lihat / Cetak">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
            ${isEditableStmt(s)?`<button class="act-icon stmt-edit-btn" data-id="${s.id}" title="Edit (bisa diubah s/d 3 hari sejak dibuat)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>
            </button>`:""}
            ${s.status!=='dibatalkan'?`<button class="act-icon stmt-cancel-btn btn-danger" data-id="${s.id}" title="Batalkan">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M4.9 4.9l14.2 14.2"/></svg>
            </button>`:""}
          </div>
        </div>
      </div>`).join("");
    holder.querySelectorAll(".stmt-view-btn").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        previewStatement = statements.find(s=>s.id===Number(btn.dataset.id));
        renderPreview();
      });
    });
    holder.querySelectorAll(".stmt-edit-btn").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        startEdit(statements.find(s=>s.id===Number(btn.dataset.id)));
      });
    });
    holder.querySelectorAll(".stmt-cancel-btn").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        cancelStatement(statements.find(s=>s.id===Number(btn.dataset.id)));
      });
    });
  }

  function renderPreview(){
    const wrap = root.querySelector("#stmt-preview-wrap");
    if(!previewStatement){
      wrap.innerHTML = `<div class="empty-state" style="border:1px dashed var(--border);border-radius:var(--radius-md);padding:40px 20px;">${iconSvg("invoice")}<div class="et-title">Belum ada statement</div></div>`;
      return;
    }
    const s = previewStatement;
    const tokoNama = cfg.tokoNama||"Nama Toko";
    const tokoAlamat = cfg.tokoAlamat||"";
    const tokoTelp = cfg.tokoTelp||"";
    wrap.innerHTML = `
      <div class="nota-preview size-invoiceA4" id="nota-content">
        <div class="np-title">${tokoNama}</div>
        ${tokoAlamat?`<div class="np-sub">${tokoAlamat}${tokoTelp?" · "+tokoTelp:""}</div>`:""}
        ${s.status==="dibatalkan"?`<div class="np-batal-banner">STATEMENT DIBATALKAN</div>`:""}
        <hr>
        <table>
          <tr><td>No. Statement</td><td style="text-align:right">${s.nomorStatement}</td></tr>
          <tr><td>Tanggal</td><td style="text-align:right">${s.tanggal}</td></tr>
          <tr><td>Pelanggan</td><td style="text-align:right">${s.pelangganNama}</td></tr>
        </table>
        <hr>
        <table class="np-body-table">
          <thead><tr><td><b>No. Nota</b></td><td><b>Tanggal</b></td><td style="text-align:right"><b>Total Nota</b></td><td style="text-align:right"><b>Sisa Tagihan</b></td></tr></thead>
          <tbody>
            ${s.items.map(it=>`<tr>
              <td>${it.nomorNota}</td>
              <td>${it.tanggalNota}</td>
              <td style="text-align:right">${fmtIDR(it.total)}</td>
              <td style="text-align:right">${fmtIDR(it.sisa)}</td>
            </tr>`).join("")}
          </tbody>
        </table>
        <hr>
        <table>
          <tr><td class="np-total">TOTAL TAGIHAN</td><td class="np-total">${fmtIDR(s.grandTotal)}</td></tr>
        </table>
        <hr>
        <div class="np-footer">${cfg.notaFooter||"Terima kasih atas kepercayaan Anda."}</div>
      </div>
    `;
    root.querySelector("#stmt-print-btn").onclick = ()=>{ window.print(); };
  }

  root.querySelector("#stmt-pelanggan").addEventListener("change", e=>{
    if(editingStatement) return;
    selPelangganId = Number(e.target.value) || null;
    renderChecklist();
  });

  renderChecklist();
  renderHistory();
  renderPreview();
}
